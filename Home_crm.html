<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOMES - CRM</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .center-box {
            position: absolute;
            top: 60%;              /* below halfway */
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        button {
            padding: 8px 16px;
            cursor: pointer;
        }
    </style>
</head>

<script>
function getQueryParams() {
    const params = new URLSearchParams(window.location.search);
    return {
        token: params.get('token'),
        p2: params.get('p2')
    };
}

window.onload = () => {
    const { token, p2 } = getQueryParams();

    console.log('Token:', token);
    console.log('User email:', p2);

    if (!token) {
        document.body.innerHTML = '<h2 style="color:red;">No token found — cannot authenticate</h2>';
        return;
    }

    // Display user info
    const userInfo = document.createElement("p");
    userInfo.textContent = `Logged in as ${p2}`;
    document.body.appendChild(userInfo);
};
</script>

<body>

<div class="center-box">
    <h1>Main Page</h1>

    <!-- 1. Simple link (same tab) -->
    <p><a href="second.html">Open Second Page (same tab)</a></p>

    <!-- 2. Link in new tab -->
    <p><a href="https://www.news.com.au" target="_blank">Open News (new tab)</a></p>

    <!-- 3. Link styled as button -->
    <p>
        <a href="second.html" target="_blank">
            <button>Open with Link Button</button>
        </a>
    </p>

    <!-- 4. Button with JavaScript (new tab) -->
    <p>
        <button onclick="window.open('second.html', '_blank')">
            Open with JS (new tab)
        </button>
    </p>

    <!-- 5. Button with JavaScript (same tab) -->
    <p>
        <button onclick="window.location.href='https://www.news.com.au'">
            Open News (same tab)
        </button>
    </p>

    <!-- 6. Form submission -->
    <p>
        <form action="second.html" method="get">
            <button type="submit">Open with Form</button>
        </form>
    </p>

    <!-- 7. Form in new tab -->
    <p>
        <form action="second.html" method="get" target="_blank">
            <button type="submit">Open Form (new tab)</button>
        </form>
    </p>

    <!-- 8. Auto redirect after 3 seconds -->
    <p>This page will auto-open second.html in 3 seconds...</p>

    <script>
        setTimeout(() => {
            console.log("Redirecting...");
            // Uncomment to enable redirect:
            // window.location.href = "second.html";
        }, 3000);

        function openPage() {
            window.open('second.html', '_blank', 'noopener,noreferrer');
        }
    </script>

    <!-- 9. Button calling function -->
    <p>
        <button onclick="openPage()">Open via Function</button>
    </p>
</div>

</body>
</html>
