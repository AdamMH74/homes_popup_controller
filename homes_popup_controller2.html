<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HOMES Client & Popup Controller</title>

  <script src="https://sdk-cdn.mypurecloud.com/javascript/221.0.0/purecloud-platform-client-v2.min.js"></script>
  <script src="https://sdk-cdn.mypurecloud.com/client-apps/2.6.7/purecloud-client-app-sdk.js"></script>

  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: #f8f9fa;
      color: #333;
    }
    h1 { color: #0052cc; margin-bottom: 8px; }
    .subtitle { color: #666; margin-bottom: 20px; font-size: 15px; }

    #statusBox {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 20px;
      max-width: 920px;
      max-height: 75vh;
      overflow-y: auto;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      line-height: 1.55;
      font-size: 14px;
    }
    #statusBox p { margin: 8px 0; padding: 6px 10px; border-radius: 4px; }

    .error   { background: #ffebee; color: #c62828; border-left: 5px solid #c62828; }
    .success { background: #e8f5e9; color: #2e7d32; border-left: 5px solid #2e7d32; }
    .info    { background: #e3f2fd; color: #1565c0; border-left: 5px solid #1565c0; }
    .warning { background: #fff3e0; color: #ef6c00; border-left: 5px solid #ef6c00; }

    button {
      margin-top: 15px;
      padding: 10px 24px;
      background-color: #0052cc;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover { background-color: #003d99; }
    button:disabled { background-color: #888; cursor: not-allowed; }

    .version { font-size: 12px; color: #888; margin-top: 12px; }
  </style>
</head>

<body>
<h1>HOMES Client & Popup Controller</h1>
<p class="subtitle">Genesys Cloud Integration • Version <span id="appVersion">1.6.0</span></p>

<div id="statusBox">
  <p class="info">Initializing HOMES Client & Popup Controller...</p>
</div>

<button id="openHomesBtn" disabled>Open HOMES CRM</button>
<button onclick="logout()">Logout & Clear Token</button>

<div class="version">
  SDK: purecloud-platform-client-v2 • OAuth: PKCE Grant
</div>

<script>
const VERSION = '1.6.0';

let platformClient = window.platformClient || (window.require ? window.require('platformClient') : null);
let client = platformClient.ApiClient.instance;

let conversationsApi, notificationsApi, usersApi;
let currentUser = null;
let pendingPopUrl = null;

// ✅ WebSocket lifecycle tracking
let activeSocket = null;
let activeChannelId = null;

/* ================= UI ================= */
function updateStatus(msg, type='info') {
  const box = document.getElementById('statusBox');
  const p = document.createElement('p');
  p.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  p.classList.add(type);
  box.appendChild(p);
  box.scrollTop = box.scrollHeight;

  console.log(`[HOMES v${VERSION}]`, msg);
}

/* ================= CONFIG ================= */
function getQueryParams() {
  const p = new URLSearchParams(window.location.search);
  return {
    gc_clientId: p.get('gc_clientId'),
    gc_region: p.get('gc_region'),
    gc_redirectUrl: p.get('gc_redirectUrl')
  };
}

function normalizeRegion(region) {
  if (!region) return 'mypurecloud.com';

  let r = region.toLowerCase()
    .replace(/^https?:\/\//,'')
    .replace(/^login\./,'')
    .replace(/^api\./,'');

  if (r.startsWith('purecloud.')) {
    r = 'mypurecloud.' + r.split('purecloud.')[1];
  }

  return r;
}

function getApiHost(region) {
  return `https://api.${normalizeRegion(region)}`;
}

/* ================= AUTH ================= */
async function ensureAuthenticated(config) {
  client.setEnvironment(getApiHost(config.gc_region));

  await client.loginPKCEGrant(
    config.gc_clientId,
    config.gc_redirectUrl
  );

  updateStatus('Authenticated via PKCE.', 'success');
}

/* ================= USER ================= */
async function loadUser() {
  usersApi = new platformClient.UsersApi();
  return await usersApi.getUsersMe();
}

/* ================= NOTIFICATIONS ================= */
async function setupNotifications(user) {
  notificationsApi = new platformClient.NotificationsApi();

  // ✅ Clean up previous socket
  if (activeSocket) {
    try { activeSocket.close(); } catch(e) {}
    activeSocket = null;
  }

  activeChannelId = null;

  const channel = await notificationsApi.postNotificationsChannels();
  activeChannelId = channel.id;

  const wsUri = channel.connectUri;

  updateStatus('Notification channel created.', 'info');

  await notificationsApi.putNotificationsChannelSubscriptions(channel.id, [
    { id: `v2.users.${user.id}.conversations.calls` }
  ]);

  updateStatus('Subscribed to call events.', 'success');

  activeSocket = new WebSocket(wsUri);

  activeSocket.onopen = () => {
    updateStatus('WebSocket connected.', 'success');
  };

  activeSocket.onmessage = (msg) => {
    try {
      const data = JSON.parse(msg.data);
      if (!data.eventBody) return;

      const event = data.eventBody;
      const participants = event.participants || [];

      const agent = participants.find(p =>
        p.purpose === 'agent' &&
        p.user?.id === user.id
      );

      const popUrl = participants
        .map(p => p.attributes?.UD_ScreenPop_URL)
        .find(Boolean);

      if (agent?.state === 'connected' && popUrl) {

        // ✅ prevent duplicates
        if (pendingPopUrl === popUrl) return;

        pendingPopUrl = popUrl;

        document.getElementById('openHomesBtn').disabled = false;

        updateStatus('📞 Live call detected — ready to open CRM.', 'success');
      }

    } catch (err) {
      console.error('WS parse error', err);
    }
  };

  activeSocket.onerror = (err) => {
    console.error('WebSocket error', err);
    updateStatus('WebSocket error.', 'error');
  };

  activeSocket.onclose = () => {
    updateStatus('WebSocket closed. Reconnecting in 5s...', 'warning');

    setTimeout(() => {
      setupNotifications(user);
    }, 5000);
  };
}

/* ================= POPUP ================= */
function openHOMESTab(url) {
  if (!url) {
    updateStatus('No popup URL.', 'warning');
    return;
  }

  const popup = window.open(url, '_blank', 'noopener');

  if (!popup) {
    updateStatus('Popup blocked.', 'error');
    return;
  }

  const email = currentUser?.email || '';
  const targetOrigin = new URL(url).origin;

  // ✅ secure handshake
  const nonce = Math.random().toString(36).substring(2);

  function handler(event) {
    if (event.origin !== targetOrigin) return;
    if (!event.data || event.data.type !== 'HOMES_READY') return;
    if (event.data.nonce !== nonce) return;

    const sessionPayload = {
      type: 'HOMES_AUTH',
      email,
      nonce,
      issuedAt: Date.now(),
      expiresAt: Date.now() + 60000
    };

    popup.postMessage(sessionPayload, targetOrigin);

    window.removeEventListener('message', handler);
  }

  window.addEventListener('message', handler);

  // Send nonce first
  popup.onload = () => {
    popup.postMessage({ type: 'HOMES_INIT', nonce }, targetOrigin);
  };

  updateStatus('Popup opened, waiting secure handshake...', 'info');

  // ✅ UX reset
  document.getElementById('openHomesBtn').disabled = true;
  pendingPopUrl = null;
}

/* ================= INIT ================= */
async function init() {
  try {
    updateStatus('Initializing...', 'info');

    let config = getQueryParams();

    if (!config.gc_clientId) {
      config = JSON.parse(localStorage.getItem('homesConfig') || '{}');
    }

    if (!config.gc_clientId || !config.gc_region || !config.gc_redirectUrl) {
      updateStatus('Missing config.', 'error');
      return;
    }

    localStorage.setItem('homesConfig', JSON.stringify(config));

    await ensureAuthenticated(config);

    conversationsApi = new platformClient.ConversationsApi();

    currentUser = await loadUser();

    updateStatus(`Logged in as ${currentUser.name}`, 'success');

    await setupNotifications(currentUser);

    document.getElementById('openHomesBtn')
      .addEventListener('click', () => openHOMESTab(pendingPopUrl));

    updateStatus('HOMES Client ready (real-time).', 'success');

  } catch (err) {
    console.error(err);
    updateStatus(err.message, 'error');
  }
}

/* ================= LOGOUT ================= */
function logout() {
  client.logout();
  localStorage.clear();
  sessionStorage.clear();
  location.reload();
}

window.onload = init;
</script>
</body>
</html>
