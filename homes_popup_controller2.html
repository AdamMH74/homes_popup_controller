<script>
document.addEventListener('DOMContentLoaded', () => {
  const VERSION = '1.3.0';

  const statusBox = document.getElementById('statusBox');
  function updateStatus(message, replaceLast = false) {
    if (!statusBox) return;
    if (replaceLast && statusBox.lastChild) {
      statusBox.lastChild.textContent = message;
    } else {
      const p = document.createElement('p');
      p.textContent = `[HOMES Client v${VERSION}] ${message}`;
      statusBox.appendChild(p);
    }
    console.log(`[HOMES Client v${VERSION}]`, message);
  }

  // 1. Handle query parameters from Genesys Cloud embedding
  function getQueryParams() {
    const params = new URLSearchParams(window.location.search);
    return {
      gc_clientId: params.get('gc_clientId'),
      gc_region: params.get('gc_region') || 'mypurecloud.com',
      gc_redirectUrl: params.get('gc_redirectUrl'),
      gcUsePopupAuth: params.get('gcUsePopupAuth') === 'true',
      debug: params.get('debug') === 'true',
      gcHostOrigin: params.get('gcHostOrigin'),
      gcTargetEnv: params.get('gcTargetEnv')
    };
  }

  // Store params in sessionStorage
  const queryParams = getQueryParams();
  Object.entries(queryParams).forEach(([key, value]) => {
    if (value !== null && value !== undefined) {
      sessionStorage.setItem(key, value);
    }
  });
  updateStatus('Configuration parameters stored.');

  const config = {
    gc_clientId: sessionStorage.getItem('gc_clientId'),
    gc_region: sessionStorage.getItem('gc_region'),
    gc_redirectUrl: sessionStorage.getItem('gc_redirectUrl'),
    gcUsePopupAuth: sessionStorage.getItem('gcUsePopupAuth') === 'true',
    gcHostOrigin: sessionStorage.getItem('gcHostOrigin'),
    gcTargetEnv: sessionStorage.getItem('gcTargetEnv')
  };

  updateStatus(`Loaded config: ${JSON.stringify(config, null, 2)}`);

  if (!config.gc_clientId || !config.gc_redirectUrl) {
    updateStatus('ERROR: Missing gc_clientId or gc_redirectUrl', true);
    throw new Error('Missing required Genesys Cloud configuration parameters');
  }

  // 2. Platform Client SDK
  const platformClient = window.purecloud?.platformClient || window.platformClient;
  if (!platformClient) {
    updateStatus('ERROR: platformClient SDK not loaded', true);
    return;
  }

  const client = platformClient.ApiClient.instance;
  client.setEnvironment(config.gc_region);
  client.setPersistSettings(true, 'homesClient');

  const usersApi = new platformClient.UsersApi();

  // 3. Client App SDK
  const ClientAppSDK = window.purecloud?.apps?.ClientApp || window.ClientApp;
  if (!ClientAppSDK) {
    updateStatus('WARNING: ClientApp SDK not found – some Genesys integration features may not work', true);
  }

  const myClientApp = ClientAppSDK 
    ? new ClientAppSDK({
        gcHostOrigin: config.gcHostOrigin,
        gcTargetEnv: config.gcTargetEnv
      })
    : null;

  // 4. Authentication & user fetch
  async function initializeApp() {
    try {
      updateStatus('Starting Implicit Grant authentication...', true);
      
      await client.loginImplicitGrant(
        config.gc_clientId,
        config.gc_redirectUrl,
        { usePopup: config.gcUsePopupAuth }
      );

      updateStatus('Authentication successful.', true);

      const me = await usersApi.getUsersMe();
      updateStatus(`Logged in as: ${me.name} (${me.email})`, true);

      if (myClientApp) {
        updateStatus('Client App SDK bootstrapped.', true);
        myClientApp.lifecycle.bootstrapped();
      }
    } catch (err) {
      console.error('[HOMES Client] Initialization error:', err);
      updateStatus(`ERROR: ${err.message || err}`, true);
    }
  }

  // 5. Lifecycle listeners
  if (myClientApp) {
    myClientApp.lifecycle.addBootstrapListener(() => {
      updateStatus('Bootstrap event received from Genesys Cloud.', true);
      initializeApp();
    });

    myClientApp.lifecycle.addStopListener(() => {
      updateStatus('Client App stopped by Genesys Cloud.', true);
      myClientApp.lifecycle.stopped();
    });
  } else {
    // Fallback if ClientApp SDK is not available
    initializeApp();
  }
});
</script>
