<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HOMES Popup Controller</title>
  <script src="https://sdk-cdn.mypurecloud.com/javascript/221.0.0/purecloud-platform-client-v2.min.js"></script>
  <script src="https://sdk-cdn.mypurecloud.com/client-apps/2.6.7/purecloud-client-app-sdk.js"></script>
  <style>
    .info-container {
      background-color: #f5f5f5;
      padding: 20px;
      border-radius: 5px;
      margin-bottom: 20px;
      font-family: Arial, sans-serif;
      font-size: 14px;
    }
    .info-container p { margin: 5px 0; }
    #openButton {
      padding: 12px 24px;
      font-size: 16px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin: 10px 0;
    }
    #openButton:hover { background-color: #0056b3; }
    #openButton:disabled { background-color: #6c757d; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="info-container" id="statusBox">
    <p><strong>Status:</strong> Initializing HOMES Popup Controller v1.0.5...</p>
  </div>

  <button id="openButton" disabled>Open HOMES CRM</button>

  <script>
    const VERSION = '1.0.5';
    const blockedAgentIds = ['a45dcb75-1121-4fb0-b956-3fb9437e539e'];

    let crmTab = null;
    let socket = null;
    let config = null;
    let currentPopUrl = null;
    let userEmail = null;

    const updateStatus = (message) => {
      const statusBox = document.getElementById('statusBox');
      const p = document.createElement('p');
      p.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
      statusBox.appendChild(p);
      statusBox.scrollTop = statusBox.scrollHeight;
      console.log('[HOMES Popup Controller]', message);
    };

    const openButton = document.getElementById('openButton');

    // ====================== HOMES TAB HANDLING ======================
    const openHOMES = () => {
      if (!currentPopUrl) {
        updateStatus('No HOMES URL available yet');
        return;
      }
      try {
        const url = new URL(currentPopUrl);
        url.searchParams.set('p2', userEmail || '');
        if (crmTab && !crmTab.closed) crmTab.location.href = url.toString();
        else crmTab = window.open(url.toString(), '_blank');
        openButton.disabled = true;
      } catch {
        updateStatus('Invalid HOMES URL, cannot open tab');
      }
    };

    const openPlaceholderTab = () => {
      if (!crmTab || crmTab.closed) {
        crmTab = window.open('about:blank', '_blank');
        updateStatus('Placeholder tab opened');
      }
    };

    // ====================== CONFIG ======================
    const initialiseAndStorePluginConfiguration = () => {
      const params = new URLSearchParams(window.location.search);
      Object.entries({
        gc_clientId: params.get('gc_clientId'),
        gc_region: params.get('gc_region'),
        gc_redirectUrl: params.get('gc_redirectUrl'),
        gcHostOrigin: params.get('gcHostOrigin'),
        gcTargetEnv: params.get('gcTargetEnv')
      }).forEach(([k, v]) => { if (v) sessionStorage.setItem(k, v); });
    };

    const getStoredConfig = () => ({
      gc_clientId: sessionStorage.getItem('gc_clientId'),
      gc_region: sessionStorage.getItem('gc_region'),
      gc_redirectUrl: sessionStorage.getItem('gc_redirectUrl'),
      gcHostOrigin: sessionStorage.getItem('gcHostOrigin'),
      gcTargetEnv: sessionStorage.getItem('gcTargetEnv')
    });

    // ====================== INIT USING CLIENT APP SDK ======================
    async function init(myClientApp) {
      try {
        const platformClient = window.purecloudPlatformClientV2; // SDK constructors
        const client = myClientApp.client;                        // authenticated ApiClient

        // Create API instances using authenticated client
        const usersApi = new platformClient.UsersApi(client);
        const notificationsApi = new platformClient.NotificationsApi(client);

        // Get current user
        const me = await usersApi.getUsersMe();
        userEmail = me.email;
        updateStatus(`Logged in as: ${me.name}`);

        if (blockedAgentIds.includes(me.id)) {
          updateStatus('This agent is blocked from using the widget');
          return;
        }

        // Notification channel
        const channel = await notificationsApi.postNotificationsChannels();
        const topic = `v2.users.${me.id}.conversations.calls`;
        await notificationsApi.putNotificationsChannelSubscriptions(channel.id, [{ id: topic }]);

        // WebSocket
        socket = new WebSocket(channel.connectUri);
        socket.onopen = () => updateStatus('WebSocket connected');
        socket.onclose = () => updateStatus('WebSocket closed');
        socket.onerror = (err) => updateStatus(`WebSocket error: ${err.message || err}`);

        socket.onmessage = (event) => {
          try {
            const data = JSON.parse(event.data);
            if (!data.eventBody) return;

            const participants = data.eventBody.participants || [];
            const agentPart = participants.find(p => p.purpose === 'agent' && p.user?.id === me.id);
            if (!agentPart) return;

            const popUrl = participants.map(p => p.attributes?.UD_ScreenPop_URL).find(u => u);

            if (agentPart.state === 'connected' && popUrl) {
              currentPopUrl = popUrl;
              openButton.disabled = false;
              updateStatus('Call connected – Open HOMES button is now available');
            }

            if ((agentPart.state === 'disconnected' || agentPart.state === 'terminated') &&
                agentPart.wrapup && crmTab && !crmTab.closed) {
              updateStatus('Closing HOMES tab after wrap-up');
              crmTab.close();
              crmTab = null;
              currentPopUrl = null;
              openButton.disabled = true;
            }
          } catch (e) {
            console.error(e);
          }
        };

      } catch (err) {
        updateStatus(`Init error: ${err.message}`);
        console.error(err);
      }
    }

    // ====================== CLIENT APP LIFECYCLE ======================
    initialiseAndStorePluginConfiguration();
    config = getStoredConfig();

    const ClientApp = window.purecloud.apps.ClientApp;
    const myClientApp = new ClientApp({
      gcHostOrigin: config.gcHostOrigin,
      gcTargetEnv: config.gcTargetEnv
    });

    myClientApp.lifecycle.addBootstrapListener(async () => {
      updateStatus('Application bootstrapped');
      openPlaceholderTab();

      try {
        await init(myClientApp); // pass full ClientApp instance
      } catch (err) {
        updateStatus(`Init error: ${err.message}`);
        console.error(err);
      }

      myClientApp.lifecycle.bootstrapped();
    });

    myClientApp.lifecycle.addStopListener(() => {
      updateStatus('Application stopped');
      if (crmTab && !crmTab.closed) crmTab.close();
      if (socket && socket.readyState === WebSocket.OPEN) socket.close();
      myClientApp.lifecycle.stopped();
    });

    // Cleanup on window unload
    window.addEventListener('beforeunload', () => {
      if (crmTab && !crmTab.closed) crmTab.close();
      if (socket && socket.readyState === WebSocket.OPEN) socket.close();
    });

    // Button click handler
    openButton.addEventListener('click', openHOMES);

    updateStatus(`HOMES Popup Controller v${VERSION} ready – click the button when available`);
  </script>
</body>
</html>
