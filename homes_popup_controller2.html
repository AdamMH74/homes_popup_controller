<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HOMES Popup Controller</title>
  <script src="https://sdk-cdn.mypurecloud.com/javascript/221.0.0/purecloud-platform-client-v2.min.js"></script>
  <script src="https://sdk-cdn.mypurecloud.com/client-apps/2.6.7/purecloud-client-app-sdk.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 10px; }
    .tab-bar { display: flex; gap: 5px; margin-bottom: 10px; }
    .tab-bar button { padding: 8px 12px; border: none; border-radius: 4px; cursor: pointer; background: #eee; }
    .tab-bar button.active { background: #007bff; color: white; }
    .tab-panel { display: none; background: #f5f5f5; padding: 15px; border-radius: 6px; min-height: 200px; }
    .tab-panel.active { display: block; }
    .info-container { font-size: 14px; line-height: 1.5; }
    button.action { padding: 6px 12px; margin-top: 5px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
    button.action:hover { background-color: #0056b3; }
  </style>
</head>
<body>

  <!-- Tab Bar -->
  <div class="tab-bar">
    <button class="tab-button active" data-tab="homesTab">HOMES</button>
    <button class="tab-button" data-tab="statusTab">Status</button>
  </div>

  <!-- Tab Panels -->
  <div id="homesTab" class="tab-panel active">
    <div class="info-container" id="homesContent">
      <p><strong>Status:</strong> Initializing HOMES Popup Controller v1.1.1...</p>
      <!-- Dynamic HOMES content will appear here -->
    </div>
  </div>

  <div id="statusTab" class="tab-panel">
    <div class="info-container" id="statusBox">
      <p><strong>Status Log:</strong></p>
    </div>
  </div>

  <script>
    const VERSION = '1.1.1';
    let homesContent = document.getElementById('homesContent');
    let statusBox = document.getElementById('statusBox');

    // ========== TAB LOGIC ==========
    document.querySelectorAll('.tab-button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.tab-panel').forEach(panel => panel.classList.remove('active'));
        document.getElementById(btn.dataset.tab).classList.add('active');
      });
    });

    // ========== STATUS LOG ==========
    function updateStatus(message) {
      const p = document.createElement('p');
      p.textContent = message;
      statusBox.appendChild(p);
      console.log('[HOMES Popup Controller]', message);
    }

    function updateHomesContent(message) {
      const p = document.createElement('p');
      p.textContent = message;
      homesContent.appendChild(p);
      console.log('[HOMES Content]', message);
    }

    // ========== SIMULATE CALL EVENTS ==========
    // Example: Instead of opening a new tab, just update the HOMES panel
    function onCallConnected(conversationId, agentEmail) {
      updateHomesContent(`Call connected for conversation ${conversationId}, agent ${agentEmail}`);
    }

    function onCallWrapup(conversationId) {
      updateHomesContent(`Wrap-up completed for conversation ${conversationId}`);
    }

    // ========== EXAMPLE INITIALIZATION ==========
    updateStatus('Controller initialized, version ' + VERSION);
    updateHomesContent('Ready to receive calls...');

    // Example of receiving a call
    setTimeout(() => onCallConnected('12345', 'agent@example.com'), 2000);
    setTimeout(() => onCallWrapup('12345'), 8000);

  </script>
</body>
</html>
