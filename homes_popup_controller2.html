<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HOMES Popup Controller</title>

  <script src="https://sdk-cdn.mypurecloud.com/javascript/221.0.0/purecloud-platform-client-v2.min.js"></script>
  <script src="https://sdk-cdn.mypurecloud.com/client-apps/2.6.7/purecloud-client-app-sdk.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
    }

    .info-container {
      background-color: #f5f5f5;
      padding: 15px;
      border-radius: 5px;
      margin-bottom: 10px;
      font-size: 13px;
    }

    #tabsHeader {
      display: flex;
      background: #eee;
      padding: 5px;
    }

    .tab {
      padding: 6px 10px;
      margin-right: 5px;
      background: #ddd;
      cursor: pointer;
      border-radius: 4px 4px 0 0;
    }

    .tab.active {
      background: white;
      font-weight: bold;
    }

    .iframe-container {
      display: none;
      height: 600px;
      border: 1px solid #ccc;
    }

    .iframe-container.active {
      display: block;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>

<body>

<div class="info-container" id="statusBox">
  <strong>Status:</strong> Initializing...
</div>

<!-- ✅ TAB CONTAINER -->
<div id="tabsHeader"></div>
<div id="tabsContent"></div>

<script>
const VERSION = '2.0.0';

const blockedAgentIds = [
  'a45dcb75-1121-4fb0-b956-3fb9437e539e'
];

const platformClient = window.platformClient;
const client = platformClient.ApiClient.instance;
const notificationsApi = new platformClient.NotificationsApi();
const conversationsApi = new platformClient.ConversationsApi();
const usersApi = new platformClient.UsersApi();

let config = null;

/* =========================
   TAB MANAGEMENT
========================= */
let crmTabs = {};
let activeTabId = null;

function createOrUpdateTab(url) {
  if (activeTabId && crmTabs[activeTabId]) {
    crmTabs[activeTabId].iframe.src = url;
    updateStatus('Reusing existing HOMES tab');
    return;
  }

  const tabId = 'tab-' + Date.now();

  const header = document.getElementById('tabsHeader');
  const content = document.getElementById('tabsContent');

  const tabBtn = document.createElement('div');
  tabBtn.className = 'tab';
  tabBtn.textContent = 'HOMES';
  tabBtn.onclick = () => activateTab(tabId);

  const iframeContainer = document.createElement('div');
  iframeContainer.className = 'iframe-container';

  const iframe = document.createElement('iframe');
  iframe.src = url;

  iframeContainer.appendChild(iframe);
  header.appendChild(tabBtn);
  content.appendChild(iframeContainer);

  crmTabs[tabId] = { tabBtn, iframeContainer, iframe };

  activateTab(tabId);
  updateStatus('Opened HOMES tab');
}

function activateTab(tabId) {
  Object.keys(crmTabs).forEach(id => {
    crmTabs[id].tabBtn.classList.toggle('active', id === tabId);
    crmTabs[id].iframeContainer.classList.toggle('active', id === tabId);
  });
  activeTabId = tabId;
}

function closeActiveTab() {
  if (!activeTabId) return;

  const tab = crmTabs[activeTabId];
  if (!tab) return;

  tab.tabBtn.remove();
  tab.iframeContainer.remove();

  delete crmTabs[activeTabId];
  activeTabId = null;

  updateStatus('Closed HOMES tab');
}

/* ========================= */

function updateStatus(msg) {
  const box = document.getElementById('statusBox');
  const p = document.createElement('div');
  p.textContent = msg;
  box.appendChild(p);
}

function getQueryParams() {
  const params = new URLSearchParams(window.location.search);
  return {
    gc_clientId: params.get('gc_clientId'),
    gc_region: params.get('gc_region'),
    gc_redirectUrl: params.get('gc_redirectUrl'),
    gcHostOrigin: params.get('gcHostOrigin'),
    gcTargetEnv: params.get('gcTargetEnv')
  };
}

function initConfig() {
  const params = getQueryParams();
  Object.entries(params).forEach(([k, v]) => {
    if (v) sessionStorage.setItem(k, v);
  });

  return {
    gc_clientId: sessionStorage.getItem('gc_clientId'),
    gc_region: sessionStorage.getItem('gc_region'),
    gc_redirectUrl: sessionStorage.getItem('gc_redirectUrl'),
    gcHostOrigin: sessionStorage.getItem('gcHostOrigin'),
    gcTargetEnv: sessionStorage.getItem('gcTargetEnv')
  };
}

/* ========================= */

async function init() {
  try {
    if (!config.gc_clientId) throw new Error('Missing config');

    client.setEnvironment(config.gc_region);
    client.setPersistSettings(true, 'homesPopup');

    await client.loginImplicitGrant(config.gc_clientId, config.gc_redirectUrl);

    const user = await usersApi.getUsersMe();
    updateStatus(`Logged in as ${user.name}`);

    if (blockedAgentIds.includes(user.id)) return;

    const channel = await notificationsApi.postNotificationsChannels();

    await notificationsApi.putNotificationsChannelSubscriptions(channel.id, [
      { id: `v2.users.${user.id}.conversations.calls` }
    ]);

    const socket = new WebSocket(channel.connectUri);

    socket.onmessage = async (event) => {
      const data = JSON.parse(event.data);
      if (!data.eventBody) return;

      const interaction = data.eventBody;
      const participants = interaction.participants || [];

      const agent = participants.find(p =>
        p.purpose === 'agent' && p.user?.id === user.id
      );

      if (!agent) return;

      const popUrl = participants
        .map(p => p.attributes?.UD_ScreenPop_URL)
        .find(Boolean);

      /* ===== CONNECTED ===== */
      if (agent.state === 'connected') {
        const connectedAgents = participants
          .filter(p => p.purpose === 'agent' && p.state === 'connected')
          .sort((a, b) => new Date(a.connectedTime) - new Date(b.connectedTime));

        const isFirst = connectedAgents[0]?.user?.id === agent.user?.id;

        if (isFirst && popUrl) {
          const url = new URL(popUrl);
          url.searchParams.set('p2', user.email);

          createOrUpdateTab(url.toString());
        }
      }

      /* ===== DISCONNECTED ===== */
      if (
        agent.state === 'disconnected' ||
        agent.state === 'terminated'
      ) {
        closeActiveTab();
      }
    };

  } catch (err) {
    updateStatus('Error: ' + err.message);
    console.error(err);
  }
}

/* ========================= */

config = initConfig();

const ClientApp = window.purecloud.apps.ClientApp;
const app = new ClientApp({
  gcHostOrigin: config.gcHostOrigin,
  gcTargetEnv: config.gcTargetEnv
});

app.lifecycle.addBootstrapListener(() => {
  updateStatus('App bootstrapped');
  app.lifecycle.bootstrapped();
});

app.lifecycle.addStopListener(() => {
  closeActiveTab();
  updateStatus('App stopped');
  app.lifecycle.stopped();
});

init();

</script>

</body>
</html>
