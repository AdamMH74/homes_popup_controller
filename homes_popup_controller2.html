<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HOMES Client App</title>
  
  <!-- Platform SDK - local file (best for reliability) -->
  <script src="purecloud-platform-client-v2.min.js"></script>
  
  <!-- Client App SDK - official Genesys CDN (specific stable version) -->
  <script src="https://sdk-cdn.mypurecloud.com/client-apps/2.6.7/purecloud-client-app-sdk.js"></script>

  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    #statusBox {
      background: #f5f5f5;
      padding: 15px;
      border-radius: 5px;
      max-width: 700px;
      min-height: 300px;
    }
    #statusBox p { margin: 6px 0; }
  </style>
</head>
<body>
  <h2>HOMES Client App Status</h2>
  <div id="statusBox">
    <p>Initializing...</p>
  </div>

  <script>
    const VERSION = '1.2.0';

    function updateStatus(message, replaceLast = false) {
      const statusBox = document.getElementById('statusBox');
      if (!statusBox) return;
      
      if (replaceLast && statusBox.lastChild) {
        statusBox.lastChild.textContent = message;
      } else {
        const p = document.createElement('p');
        p.textContent = message;
        statusBox.appendChild(p);
      }
      console.log('[HOMES Client]', message);
    }

    // Get query parameters from Genesys Cloud
    function getQueryParams() {
      const params = new URLSearchParams(window.location.search);
      return {
        gc_clientId: params.get('gc_clientId'),
        gc_region: params.get('gc_region'),
        gc_redirectUrl: params.get('gc_redirectUrl'),
        gcHostOrigin: params.get('gcHostOrigin'),
        gcTargetEnv: params.get('gcTargetEnv'),
        gcUsePopupAuth: params.get('gcUsePopupAuth')
      };
    }

    const config = getQueryParams();
    updateStatus(`Loaded configuration: ${JSON.stringify(config)}`);

    if (!config.gc_clientId || !config.gc_redirectUrl) {
      updateStatus('ERROR: Missing gc_clientId or gc_redirectUrl', true);
      return;
    }

    // Initialize Platform Client (correct way)
    const platformClient = require('platformClient');
    const client = platformClient.ApiClient.instance;
    client.setEnvironment(config.gc_region || 'mypurecloud.com.au');
    client.setPersistSettings(true, 'homesClient');
    updateStatus('Platform client initialized.');

    // Initialize Client App SDK
    const ClientApp = window.purecloud?.apps?.ClientApp || window.ClientApp;
    const myClientApp = new ClientApp({
      gcHostOrigin: config.gcHostOrigin,
      gcTargetEnv: config.gcTargetEnv
    });

    // Lifecycle
    myClientApp.lifecycle.addBootstrapListener(async () => {
      updateStatus(`Client App SDK bootstrapped (v${VERSION}).`, true);
      myClientApp.lifecycle.bootstrapped();

      try {
        updateStatus('Authenticating...', true);
        await client.loginImplicitGrant(
          config.gc_clientId,
          config.gc_redirectUrl,
          config.gcUsePopupAuth === 'true'
        );
        updateStatus('Authentication successful.', true);

        const usersApi = new platformClient.UsersApi();
        const me = await usersApi.getUsersMe();
        updateStatus(`Logged in as: ${me.name}`, true);
      } catch (err) {
        updateStatus(`Auth error: ${err.message}`, true);
        console.error(err);
      }
    });

    myClientApp.lifecycle.addStopListener(() => {
      updateStatus('Client App SDK stopped.');
      myClientApp.lifecycle.stopped();
    });
  </script>
</body>
</html>
