<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Genesys Cloud SDK Client Test</title>
  <script src="https://sdk-cdn.mypurecloud.com/javascript/221.0.0/purecloud-platform-client-v2.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    #status { margin-top: 20px; }
  </style>
</head>
<body>
  <h1>Genesys Cloud SDK Client Test</h1>
  <div id="status">Initializing...</div>

  <script>
    const client = platformClient.ApiClient.instance;
    const usersApi = new platformClient.UsersApi();

    // Configuration - replace with your own values or get from URL query
    const CONFIG = {
      clientId: 'YOUR_CLIENT_ID_HERE',
      redirectUri: window.location.href, // Current page
      environment: 'mypurecloud.com' // or e.g., mypurecloud.ie, mypurecloud.au
    };

    const statusDiv = document.getElementById('status');
    function updateStatus(msg) {
      console.log('[SDK Test]', msg);
      statusDiv.textContent = msg;
    }

    async function init() {
      try {
        updateStatus('Setting environment...');
        client.setEnvironment(CONFIG.environment);

        updateStatus('Logging in via implicit grant...');
        await client.loginImplicitGrant(CONFIG.clientId, CONFIG.redirectUri);

        updateStatus('Logged in successfully! Fetching user info...');
        const me = await usersApi.getUsersMe();
        updateStatus(`Hello, ${me.name} (${me.email})`);
      } catch (err) {
        console.error(err);
        updateStatus(`Error: ${err.message}`);
      }
    }

    init();
  </script>
</body>
</html>
