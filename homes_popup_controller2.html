<script>
const VERSION = '1.0.1';

// Utility to log messages
function updateStatus(message, isError = false) {
  const statusBox = document.getElementById('statusBox');
  if (!statusBox) return;
  
  const p = document.createElement('p');
  p.textContent = message;
  if (isError) p.classList.add('error');
  statusBox.appendChild(p);
  statusBox.scrollTop = statusBox.scrollHeight;
  console.log('[HOMES Client]', message);
}

// Get query parameters from Genesys Cloud
function getQueryParams() {
  const params = new URLSearchParams(window.location.search);
  return {
    gc_clientId: params.get('gc_clientId'),
    gc_clientSecret: params.get('gc_clientSecret'),
    gc_region: params.get('gc_region'),
  };
}

const config = getQueryParams();
updateStatus(`Loaded configuration: ${JSON.stringify(config, null, 2)}`);

// --- OAuth Client Credentials Token ---
async function getOAuthToken(clientId, clientSecret, region) {
  const tokenUrl = `https://login.${region}/oauth/token`;
  const body = new URLSearchParams({ grant_type: 'client_credentials' });
  const credentials = btoa(`${clientId}:${clientSecret}`);

  const response = await fetch(tokenUrl, {
    method: 'POST',
    headers: {
      'Authorization': `Basic ${credentials}`,
      'Content-Type': 'application/x-www-form-urlencoded'
    },
    body
  });

  if (!response.ok) throw new Error(`Token request failed: ${response.statusText}`);
  const data = await response.json();
  return data.access_token;
}

// --- Display users nicely in the UI ---
function displayUsers(users) {
  updateStatus(`✅ Retrieved ${users.length} user(s):`);
  users.forEach(user => {
    const name = user.name || 'N/A';
    const email = user.email || 'N/A';
    const title = user.title || '';
    updateStatus(`   • ${name} (${email}) ${title ? '- ' + title : ''}`);
  });
}

// --- Fetch all users with pagination ---
async function getAllUsers(usersApi) {
  let page = 1;
  const allUsers = [];

  while (true) {
    const response = await usersApi.getUsers({ pageSize: 25, pageNumber: page });
    if (response.entities && response.entities.length > 0) {
      allUsers.push(...response.entities);
    }
    if (page * 25 >= response.total) break;
    page++;
  }

  return allUsers;
}

// --- Initialize Platform Client using require() ---
async function initPlatformClient() {
  try {
    updateStatus('Fetching OAuth token...');
    const token = await getOAuthToken(config.gc_clientId, config.gc_clientSecret, config.gc_region);
    updateStatus('✅ OAuth token acquired');

    // Use require() as in your original code
    const platformClient = require('platformClient');
    const client = platformClient.ApiClient.instance;
    client.setEnvironment(config.gc_region);
    client.setAccessToken(token);
    updateStatus('✅ Platform client initialized');

    const usersApi = new platformClient.UsersApi();

    // Get current user
    const me = await usersApi.getUsersMe({ expand: ['presence', 'routingStatus'] });
    updateStatus(`✅ Current user: ${me.name} (${me.email || me.username})`);
    console.log('Current user full object:', me);

    // Get all users
    const allUsers = await getAllUsers(usersApi);
    displayUsers(allUsers);

    updateStatus(`✅ All users fetched successfully (total: ${allUsers.length})`);
  } catch (err) {
    updateStatus(`❌ Initialization failed: ${err.message || err}`, true);
    console.error(err);
  }
}

// Start the app
updateStatus('Initializing HOMES client using OAuth...');
initPlatformClient();
</script>
