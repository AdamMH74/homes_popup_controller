<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HOMES Client App</title>
  <script src="https://sdk-cdn.mypurecloud.com/javascript/latest/purecloud-platform-client-v2.min.js"></script>
  <script src="https://sdk-cdn.mypurecloud.com/client-apps/2.6.7/purecloud-client-app-sdk.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    #statusBox {
      background: #f5f5f5;
      padding: 15px;
      border-radius: 5px;
      max-width: 800px;
      max-height: 600px;
      overflow-y: auto;
      font-size: 14px;
    }
    #statusBox p { margin: 6px 0; }
    .error { color: #d32f2f; }
    .success { color: #388e3c; }
  </style>
</head>
<body>
  <h2>HOMES Client App Status</h2>
  <div id="statusBox">
    <p>Initializing...</p>
  </div>

  <script>
    const VERSION = '1.0.2';

    function updateStatus(message, isError = false) {
      const statusBox = document.getElementById('statusBox');
      const p = document.createElement('p');
      p.textContent = message;
      if (isError) p.classList.add('error');
      else if (message.includes('✅')) p.classList.add('success');
      statusBox.appendChild(p);
      statusBox.scrollTop = statusBox.scrollHeight;
      console.log('[HOMES Client]', message);
    }

    // Get query parameters passed by Genesys Cloud
    const params = new URLSearchParams(window.location.search);
    const config = {
      gc_region: params.get('gc_region') || 'mypurecloud.com.au',
      gcHostOrigin: params.get('gcHostOrigin'),
      gcTargetEnv: params.get('gcTargetEnv'),
      gc_conversationId: params.get('gc_conversationId')
    };

    updateStatus(`Loaded config → Region: ${config.gc_region} | Conversation ID: ${config.gc_conversationId || 'N/A'}`);

    // Wait for platformClient to be available
    function waitForPlatformClient(callback, retries = 50) {
      if (typeof platformClient !== 'undefined' && platformClient?.ApiClient) {
        callback();
      } else if (retries > 0) {
        setTimeout(() => waitForPlatformClient(callback, retries - 1), 100);
      } else {
        updateStatus('❌ platformClient SDK failed to load after timeout', true);
      }
    }

    waitForPlatformClient(() => {
      updateStatus('✅ Platform Client SDK loaded successfully');

      const client = platformClient.ApiClient.instance;
      client.setEnvironment(config.gc_region);
      client.setPersistSettings(true, 'homesClient');

      // === Client App SDK ===
      const myClientApp = new window.purecloud.apps.ClientApp({
        gcHostOrigin: config.gcHostOrigin,
        gcTargetEnv: config.gcTargetEnv
      });

      const usersApi = new platformClient.UsersApi();

      myClientApp.lifecycle.addBootstrapListener(() => {
        updateStatus(`🚀 Client App SDK bootstrapped (v${VERSION})`);

        // Get Current Logged-in User (Most Useful)
        usersApi.getUsersMe({ expand: ['presence', 'routingStatus', 'locations'] })
          .then(me => {
            updateStatus(`✅ Current Agent: ${me.name} (${me.email || me.username})`, false);
            console.log('Full current user object:', me);
          })
          .catch(err => {
            updateStatus(`❌ getUsersMe failed: ${err.message || err}`, true);
            console.error(err);
          });

        // Example: Get list of users
        usersApi.getUsers({ pageSize: 15, pageNumber: 1 })
          .then(data => {
            updateStatus(`✅ Retrieved ${data.entities?.length || 0} users (page ${data.pageNumber})`);
          })
          .catch(err => {
            updateStatus(`❌ getUsers failed: ${err.message || err}`, true);
          });

        myClientApp.lifecycle.bootstrapped();
        updateStatus('✅ Bootstrapped signal sent to Genesys Cloud');
      });

      myClientApp.lifecycle.addStopListener(() => {
        updateStatus('Client App stopped');
        myClientApp.lifecycle.stopped();
      });

      updateStatus('Waiting for Genesys Cloud to bootstrap the app...');
    });
  </script>
</body>
</html>
