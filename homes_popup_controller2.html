<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HOMES Popup Controller</title>
  <script src="https://sdk-cdn.mypurecloud.com/client-apps/2.6.7/purecloud-client-app-sdk.js"></script>

  <style>
    body { font-family: Arial, sans-serif; }

    .tabs {
      display: flex;
      margin-bottom: 10px;
    }

    .tab-button {
      padding: 10px 20px;
      cursor: pointer;
      border: none;
      background: #ddd;
    }

    .tab-button.active {
      background: #007bff;
      color: white;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .info-container {
      background-color: #f5f5f5;
      padding: 15px;
      border-radius: 5px;
      height: 500px;
      overflow-y: auto;
      font-size: 13px;
    }

    iframe {
      width: 100%;
      height: 600px;
      border: none;
    }
  </style>
</head>

<body>

  <!-- Tabs -->
  <div class="tabs">
  <button class="tab-button" onclick="switchTab('status')">Status</button>
    <button class="tab-button active" onclick="switchTab('home')">Homes - CRM</button>
    
  </div>

  <!-- Home Tab -->
  <div id="home" class="tab-content active">
    <iframe id="crmFrame"></iframe>
  </div>

  <!-- Status Tab -->
  <div id="status" class="tab-content">
    <div class="info-container" id="statusBox"></div>
  </div>

  <script>
    const VERSION = '2.0.0';

    let socket = null;
    let crmTab = null;
    let config = null;
    let currentPopUrl = null;
    let userEmail = null;

    // ====================== UI ======================
    function switchTab(tabId) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-button').forEach(el => el.classList.remove('active'));

      document.getElementById(tabId).classList.add('active');
      document.querySelector(`[onclick="switchTab('${tabId}')"]`).classList.add('active');
    }

    const updateStatus = (msg) => {
      const box = document.getElementById('statusBox');
      const p = document.createElement('p');
      p.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      box.appendChild(p);
      box.scrollTop = box.scrollHeight;
      console.log(msg);
    };

    // ====================== CRM LOAD ======================
    const loadHOMES = () => {
      if (!currentPopUrl) {
        updateStatus('No HOMES URL available');
        return;
      }

      try {
        const url = new URL(currentPopUrl);
        url.searchParams.set('p2', userEmail || '');

        document.getElementById('crmFrame').src = url.toString();
        switchTab('home');

        updateStatus('HOMES loaded in iframe');
      } catch {
        updateStatus('Invalid HOMES URL');
      }
    };

    // ====================== CONFIG ======================
    const initialiseAndStorePluginConfiguration = () => {
      const params = new URLSearchParams(window.location.search);

      Object.entries({
        gc_clientId: params.get('gc_clientId'),
        gc_region: params.get('gc_region'),
        gc_redirectUrl: params.get('gc_redirectUrl'),
        gcHostOrigin: params.get('gcHostOrigin'),
        gcTargetEnv: params.get('gcTargetEnv')
      }).forEach(([k, v]) => {
        if (v) sessionStorage.setItem(k, v);
      });
    };

    const getStoredConfig = () => ({
      gc_clientId: sessionStorage.getItem('gc_clientId'),
      gc_region: sessionStorage.getItem('gc_region'),
      gc_redirectUrl: sessionStorage.getItem('gc_redirectUrl'),
      gcHostOrigin: sessionStorage.getItem('gcHostOrigin'),
      gcTargetEnv: sessionStorage.getItem('gcTargetEnv')
    });

    // ====================== INIT ======================
    async function init(client) {
      try {
        const me = await client.get('/api/v2/users/me');
        userEmail = me.email;

        updateStatus(`Logged in as: ${me.name}`);

        // Create notification channel
        const channel = await client.post('/api/v2/notifications/channels');

        const topic = `v2.users.${me.id}.conversations.calls`;

        await client.put(
          `/api/v2/notifications/channels/${channel.id}/subscriptions`,
          [{ id: topic }]
        );

        updateStatus('Subscribed to conversation events');

        // WebSocket
        socket = new WebSocket(channel.connectUri);

        socket.onopen = () => updateStatus('WebSocket connected');
        socket.onclose = () => updateStatus('WebSocket closed');
        socket.onerror = () => updateStatus('WebSocket error');

        socket.onmessage = (event) => {
          try {
            const data = JSON.parse(event.data);
            if (!data.eventBody) return;

            const participants = data.eventBody.participants || [];

            const agentPart = participants.find(
              p => p.purpose === 'agent' && p.user?.id === me.id
            );

            if (!agentPart) return;

            // 🔍 Find ANY URL attribute (more flexible)
            const popUrl = participants
              .flatMap(p => Object.values(p.attributes || {}))
              .find(v => typeof v === 'string' && v.startsWith('http'));

            updateStatus(`Agent state: ${agentPart.state}`);

            if (agentPart.state === 'connected' && popUrl) {
              currentPopUrl = popUrl;
              updateStatus('Call connected – loading HOMES');
              loadHOMES();
            }

            if (
              (agentPart.state === 'disconnected' || agentPart.state === 'terminated') &&
              agentPart.wrapup
            ) {
              updateStatus('Call ended');
            }

          } catch (e) {
            console.error(e);
          }
        };

      } catch (err) {
        updateStatus(`Init error: ${err.message}`);
        console.error(err);
      }
    }

    // ====================== BOOTSTRAP ======================
    initialiseAndStorePluginConfiguration();
    config = getStoredConfig();

    const ClientApp = window.purecloud.apps.ClientApp;

    const myClientApp = new ClientApp({
      gcHostOrigin: config.gcHostOrigin,
      gcTargetEnv: config.gcTargetEnv
    });

    myClientApp.lifecycle.addBootstrapListener(() => {
  updateStatus('Application bootstrapped');

  let attempts = 0;

  const waitForClient = () => {
    attempts++;

    if (myClientApp.client) {
      updateStatus('Client acquired');
      init(myClientApp.client);
      return;
    }

    if (attempts > 50) { // ~5 seconds
      updateStatus('ERROR: Client not available (popup auth issue)');
      return;
    }

    setTimeout(waitForClient, 100);
  };

  waitForClient();

  myClientApp.lifecycle.bootstrapped();
});

    myClientApp.lifecycle.addStopListener(() => {
      updateStatus('Application stopped');

      if (socket && socket.readyState === WebSocket.OPEN) {
        socket.close();
      }

      myClientApp.lifecycle.stopped();
    });

    window.addEventListener('beforeunload', () => {
      if (socket && socket.readyState === WebSocket.OPEN) {
        socket.close();
      }
    });

    updateStatus(`HOMES Controller v${VERSION} ready`);
  </script>

</body>
</html>
