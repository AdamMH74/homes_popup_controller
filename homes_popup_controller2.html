<script>
const VERSION = '1.0.5';

const platformClient = require('platformClient');
const client = platformClient.ApiClient.instance;
const notificationsApi = new platformClient.NotificationsApi();
const conversationsApi = new platformClient.ConversationsApi();
const usersApi = new platformClient.UsersApi();

let config = null;
let crmTab = null;
let crmPreopened = false;

// -----------------------
// Status
// -----------------------
function updateStatus(message) {
    const statusBox = document.getElementById('statusBox');
    const p = document.createElement('p');
    p.textContent = message;
    statusBox.appendChild(p);
    console.log('[HOMES Popup Controller]', message);
}

// -----------------------
// Config
// -----------------------
function getQueryParams() {
    const params = new URLSearchParams(window.location.search);
    return {
        gc_clientId: params.get('gc_clientId'),
        gc_region: params.get('gc_region'),
        gc_redirectUrl: params.get('gc_redirectUrl')
    };
}

function initialiseAndStorePluginConfiguration() {
    const params = getQueryParams();
    for (const [key, value] of Object.entries(params)) {
        if (value !== null) sessionStorage.setItem(key, value);
    }
}

function getStoredConfig() {
    return {
        gc_clientId: sessionStorage.getItem('gc_clientId'),
        gc_region: sessionStorage.getItem('gc_region'),
        gc_redirectUrl: sessionStorage.getItem('gc_redirectUrl')
    };
}

// -----------------------
// Auto pre-open (popup blocker fix)
// -----------------------
function preopenCrmTab() {
    if (crmPreopened) return;

    crmTab = window.open('', '_blank');

    if (crmTab) {
        crmPreopened = true;

        crmTab.document.write(`
            <html>
            <head>
                <title>Loading CRM...</title>
                <style>
                    body {
                        font-family: Arial;
                        display: flex;
                        justify-content: center;
                        align-items: center;
                        height: 100vh;
                        background: #f5f5f5;
                    }
                </style>
            </head>
            <body>
                <div>
                    <h2>Opening CRM...</h2>
                    <p>Please wait while we connect your call.</p>
                </div>
            </body>
            </html>
        `);
        crmTab.document.close();

        updateStatus('CRM tab pre-opened.');
    }
}

// Trigger once on first user interaction
['click', 'keydown', 'mousedown', 'touchstart'].forEach(eventType => {
    window.addEventListener(eventType, preopenCrmTab, { once: true });
});

// -----------------------
// Open CRM only if connected
// -----------------------
function openCrmIfConnected(popUrl, userEmail, agentState) {
    if (agentState !== 'connected') return;

    const url = new URL(popUrl);
    url.searchParams.set('p2', userEmail);

    if (crmTab && !crmTab.closed) {
        crmTab.location.replace(url.toString());
        crmTab.focus();
        updateStatus('CRM tab navigated.');
    } else {
        crmTab = window.open(url.toString(), '_blank'); // fallback
        updateStatus('CRM popup fallback opened.');
    }
}

// -----------------------
// Init
// -----------------------
async function init() {
    try {
        client.setEnvironment(config.gc_region);
        await client.loginImplicitGrant(config.gc_clientId, config.gc_redirectUrl);

        const user = await usersApi.getUsersMe();
        updateStatus(`Logged in as: ${user.name}`);

        const channel = await notificationsApi.postNotificationsChannels();
        const topic = `v2.users.${user.id}.conversations.calls`;

        await notificationsApi.putNotificationsChannelSubscriptions(channel.id, [{ id: topic }]);

        const socket = new WebSocket(channel.connectUri);

        socket.onmessage = async (event) => {
            const data = JSON.parse(event.data);
            if (!data.eventBody) return;

            const interaction = data.eventBody;
            const participants = interaction.participants || [];

            const agentParticipant = participants.find(
                p => p.purpose === 'agent' && p.user?.id === user.id
            );

            if (!agentParticipant) return;

            const popUrl = participants
                .map(p => p.attributes?.UD_ScreenPop_URL)
                .find(url => url);

            if (agentParticipant.state === 'connected' && popUrl) {
                const connectedAgents = participants
                    .filter(p => p.purpose === 'agent' && p.state === 'connected')
                    .sort((a, b) => new Date(a.connectedTime) - new Date(b.connectedTime));

                const isFirstAgent =
                    connectedAgents[0]?.user?.id === agentParticipant.user?.id;

                if (isFirstAgent) {
                    openCrmIfConnected(popUrl, user.email, agentParticipant.state);
                }
            }

            if (['disconnected', 'terminated'].includes(agentParticipant.state)) {
                if (crmTab && !crmTab.closed) {
                    crmTab.close();
                    crmTab = null;
                    updateStatus('CRM tab closed.');
                }
            }
        };
    } catch (err) {
        updateStatus(`Error: ${err.message}`);
    }
}

// -----------------------
initialiseAndStorePluginConfiguration();
config = getStoredConfig();
init();
</script>
