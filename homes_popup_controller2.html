<script>
const VERSION = '2.0.0';

// ================= CONFIG =================
const existingCallCheckInterval = 2500;
const existingCallMaxChecks = 20;
const SOCKET_RETRY_DELAY = 5000;

// ================= STATE =================
let config = null;
let crmTab = null;
let currentConversationId = null;
let socket = null;
let channelId = null;

// ================= SDK LOAD =================
function getPlatformClient() {
  if (window.platformClientV2) return window.platformClientV2;
  throw new Error('Genesys SDK not loaded');
}

// ================= UI =================
function updateStatus(message) {
  const box = document.getElementById('statusBox');
  const p = document.createElement('p');
  p.textContent = message;
  box.appendChild(p);
}

function log(...args) {
  console.log('[HOMES]', ...args);
}

// ================= CONFIG =================
function getQueryParams() {
  const params = new URLSearchParams(window.location.search);
  return {
    gc_clientId: params.get('gc_clientId'),
    gc_region: params.get('gc_region'),
    gc_redirectUrl: params.get('gc_redirectUrl'),
    gcHostOrigin: params.get('gcHostOrigin'),
    gcTargetEnv: params.get('gcTargetEnv')
  };
}

function initConfig() {
  const params = getQueryParams();
  Object.entries(params).forEach(([k,v])=>{
    if (v) sessionStorage.setItem(k,v);
  });

  return {
    gc_clientId: sessionStorage.getItem('gc_clientId'),
    gc_region: sessionStorage.getItem('gc_region'),
    gc_redirectUrl: sessionStorage.getItem('gc_redirectUrl'),
    gcHostOrigin: sessionStorage.getItem('gcHostOrigin'),
    gcTargetEnv: sessionStorage.getItem('gcTargetEnv')
  };
}

// ================= POPUP CONTROL =================
function ensureCrmTab() {
  if (!crmTab || crmTab.closed) {
    crmTab = window.open('about:blank', '_blank');
    log('Opened new CRM tab');
  }
}

function openCrm(url) {
  ensureCrmTab();
  crmTab.location.href = url;
}

function closeCrm() {
  if (crmTab && !crmTab.closed) {
    crmTab.close();
    crmTab = null;
    log('CRM tab closed');
  }
}

// ================= CALL HANDLER =================
function handleInteraction(interaction, user) {
  const participants = interaction.participants || [];

  const agent = participants.find(p =>
    p.purpose === 'agent' && p.user?.id === user.id
  );

  if (!agent) return;

  const popUrl = participants
    .map(p => p.attributes?.UD_ScreenPop_URL)
    .find(Boolean);

  if (!popUrl) return;

  // Connected
  if (agent.state === 'connected') {
    const connectedAgents = participants
      .filter(p => p.purpose === 'agent' && p.state === 'connected')
      .sort((a,b)=> new Date(a.connectedTime) - new Date(b.connectedTime));

    const isFirst = connectedAgents[0]?.user?.id === user.id;

    if (!isFirst) return;

    // prevent duplicate popup for same conversation
    if (currentConversationId === interaction.id) {
      log('Duplicate event ignored');
      return;
    }

    currentConversationId = interaction.id;

    const url = new URL(popUrl);
    url.searchParams.set('p2', user.email);

    updateStatus(`Opening CRM: ${url}`);
    openCrm(url.toString());
  }

  // Disconnect
  if (['disconnected','terminated'].includes(agent.state)) {
    if (agent.wrapup) {
      updateStatus('Closing CRM after wrap-up');
      closeCrm();
      currentConversationId = null;
    }
  }
}

// ================= SOCKET =================
function startWebSocket(channel, user, notificationsApi) {
  socket = new WebSocket(channel.connectUri);

  socket.onopen = () => updateStatus('WebSocket connected');

  socket.onmessage = (event) => {
    try {
      const data = JSON.parse(event.data);
      if (!data.eventBody) return;
      handleInteraction(data.eventBody, user);
    } catch (e) {
      console.error(e);
    }
  };

  socket.onclose = () => {
    updateStatus('WebSocket closed. Retrying...');
    setTimeout(()=> reconnect(user, notificationsApi), SOCKET_RETRY_DELAY);
  };

  socket.onerror = (e) => {
    console.error('WebSocket error', e);
  };
}

// ================= RECONNECT =================
async function reconnect(user, notificationsApi) {
  try {
    updateStatus('Reconnecting...');
    const channel = await notificationsApi.postNotificationsChannels();

    await notificationsApi.putNotificationsChannelSubscriptions(
      channel.id,
      [{ id: `v2.users.${user.id}.conversations.calls` }]
    );

    startWebSocket(channel, user, notificationsApi);
  } catch (e) {
    console.error('Reconnect failed', e);
  }
}

// ================= INIT =================
async function init() {
  try {
    const platformClient = getPlatformClient();
    const client = platformClient.ApiClient.instance;

    const notificationsApi = new platformClient.NotificationsApi();
    const usersApi = new platformClient.UsersApi();

    config = initConfig();

    client.setEnvironment(config.gc_region);

    updateStatus('Authenticating...');
    await client.loginImplicitGrant(config.gc_clientId, config.gc_redirectUrl);

    const user = await usersApi.getUsersMe();
    updateStatus(`Logged in: ${user.name}`);

    const channel = await notificationsApi.postNotificationsChannels();

    await notificationsApi.putNotificationsChannelSubscriptions(
      channel.id,
      [{ id: `v2.users.${user.id}.conversations.calls` }]
    );

    startWebSocket(channel, user, notificationsApi);

  } catch (e) {
    console.error(e);
    updateStatus(`Init error: ${e.message}`);
  }
}

// ================= CLIENT APP =================
const ClientApp = window.purecloud.apps.ClientApp;
config = initConfig();

const app = new ClientApp({
  gcHostOrigin: config.gcHostOrigin,
  gcTargetEnv: config.gcTargetEnv
});

app.lifecycle.addBootstrapListener(() => {
  updateStatus('App bootstrapped');

  // IMPORTANT: popup allowed here
  crmTab = window.open('about:blank', '_blank');

  app.lifecycle.bootstrapped();
});

app.lifecycle.addStopListener(() => {
  updateStatus('App stopped');
  closeCrm();
  if (socket) socket.close();
  app.lifecycle.stopped();
});

// ================= START =================
init();
</script>
