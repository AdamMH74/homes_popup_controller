<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HOMES Client App</title>
  <script src="purecloud-platform-client-v2.min.js"></script>
  <script src="https://sdk-cdn.mypurecloud.com/client-apps/2.6.7/purecloud-client-app-sdk.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    #statusBox {
      background: #f5f5f5;
      padding: 15px;
      border-radius: 5px;
      max-width: 800px;
      max-height: 600px;
      overflow-y: auto;
    }
    #statusBox p { margin: 5px 0; }
    .error { color: red; }
    .success { color: green; }
  </style>
</head>
<body>
  <h2>HOMES Client App Status</h2>
  <div id="statusBox">
    <p>Initializing...</p>
  </div>

  <script>
    const VERSION = '1.0.1'; // bumped version

    function updateStatus(message, isError = false) {
      const statusBox = document.getElementById('statusBox');
      if (!statusBox) return;
      
      const p = document.createElement('p');
      p.textContent = message;
      if (isError) p.classList.add('error');
      statusBox.appendChild(p);
      statusBox.scrollTop = statusBox.scrollHeight;
      console.log('[HOMES Client]', message);
    }

    // Get query parameters from Genesys Cloud
    function getQueryParams() {
      const params = new URLSearchParams(window.location.search);
      return {
        gc_clientId: params.get('gc_clientId'),
        gc_region: params.get('gc_region'),
        gc_redirectUrl: params.get('gc_redirectUrl'),
        gcHostOrigin: params.get('gcHostOrigin'),
        gcTargetEnv: params.get('gcTargetEnv')
      };
    }

    const config = getQueryParams();
    updateStatus(`Loaded configuration: ${JSON.stringify(config, null, 2)}`);

    // === Platform Client Setup (Browser-friendly) ===
  function initClientApp() {
  if (!window.purecloud || !window.purecloud.apps) {
    updateStatus('⏳ Waiting for Client App SDK...');
    setTimeout(initClientApp, 100);
    return;
  }

  updateStatus('✅ Client App SDK loaded');

  const ClientApp = window.purecloud.apps.ClientApp;

  const myClientApp = new ClientApp({
    gcHostOrigin: config.gcHostOrigin,
    gcTargetEnv: config.gcTargetEnv
  });

  // === Bootstrap Listener ===
  // Wait until authentication API is ready
function waitForAuth(clientApp) {
  return new Promise((resolve, reject) => {
    const checkAuth = () => {
      if (clientApp.authentication && typeof clientApp.authentication.getAccessToken === 'function') {
        resolve(clientApp.authentication);
      } else {
        setTimeout(checkAuth, 50);
      }
    };
    checkAuth();
  });
}

myClientApp.lifecycle.addBootstrapListener(() => {
  updateStatus(`Client App SDK bootstrapped (v${VERSION}).`);

  try {
    const platformClient = require('platformClient');
    const client = platformClient.ApiClient.instance;

    client.setEnvironment(config.gc_region);
    client.setPersistSettings(true, 'homesClient');
    updateStatus('✅ Platform client initialized');

    waitForAuth(myClientApp)
      .then(auth => auth.getAccessToken())
      .then(token => {
        if (!token) throw new Error('No token returned from Client App SDK');
        client.setAccessToken(token);
        updateStatus('✅ Access token set in Platform Client');

        const usersApi = new platformClient.UsersApi();

        return usersApi.getUsersMe({ expand: ['presence', 'routingStatus'] })
          .then(me => {
            updateStatus(`✅ Current user: ${me.name} (${me.email || me.username})`);
            return usersApi.getUsers({ pageSize: 25, pageNumber: 1 });
          })
          .then(response => {
            updateStatus(`✅ Fetched page ${response.pageNumber} of users`);
            if (response.entities && response.entities.length > 0) {
              displayUsers(response.entities);
            } else {
              updateStatus('No users returned.');
            }
          });
      })
      .catch(err => {
        updateStatus(`❌ Auth/API error: ${err.message || err}`, true);
        console.error(err);
      })
      .finally(() => {
        myClientApp.lifecycle.bootstrapped();
        updateStatus('Lifecycle: bootstrapped() called.');
      });

  } catch (err) {
    updateStatus(`❌ Init error: ${err.message || err}`, true);
  }
});

  myClientApp.lifecycle.addStopListener(() => {
    updateStatus('Client App SDK stopped.');
    myClientApp.lifecycle.stopped();
  });

  updateStatus('Event listeners registered.');
}
function displayUsers(users) {
  updateStatus(`✅ Retrieved ${users.length} user(s):`);
  users.forEach(user => {
    const name = user.name || 'N/A';
    const email = user.email || 'N/A';
    const title = user.title || '';
    updateStatus(`   • ${name} (${email}) ${title ? '- ' + title : ''}`);
  });
}
// Start initialization
initClientApp();
  </script>
</body>
</html>
