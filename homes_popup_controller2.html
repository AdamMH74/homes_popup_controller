<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HOMES Popup Controller</title>
  <script src="https://sdk-cdn.mypurecloud.com/javascript/221.0.0/purecloud-platform-client-v2.min.js"></script>
  <script src="https://sdk-cdn.mypurecloud.com/client-apps/2.6.7/purecloud-client-app-sdk.js"></script>
  <style>
    .info-container {
      background-color: #f5f5f5;
      padding: 20px;
      border-radius: 5px;
      margin-bottom: 20px;
      font-family: Arial, sans-serif;
      font-size: 14px;
    }
    .info-container p { margin: 5px 0; }
    #openCrmBtn { padding: 8px 12px; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="info-container" id="statusBox">
    <p><strong>Status:</strong> Initializing HOMES Popup Controller...</p>
  </div>

  <button id="openCrmBtn" style="display:none;">Open CRM</button>

  <script>
    const VERSION = '2.0.0';
    const blockedAgentIds = ['a45dcb75-1121-4fb0-b956-3fb9437e539e']; 
    let crmTab = null;
    let pendingPopUrl = null;
    let config = null;
    const existingCallCheckInterval = 2500;
    const existingCallMaxChecks = 20;

    const platformClient = require('platformClient');
    const client = platformClient.ApiClient.instance;
    const notificationsApi = new platformClient.NotificationsApi();
    const conversationsApi = new platformClient.ConversationsApi();
    const usersApi = new platformClient.UsersApi();

    function updateStatus(message) {
      const statusBox = document.getElementById('statusBox');
      const p = document.createElement('p');
      p.textContent = message;
      statusBox.appendChild(p);
      console.log('[HOMES Popup Controller]', message);
    }

    function getQueryParams() {
      const params = new URLSearchParams(window.location.search);
      return {
        gc_clientId: params.get('gc_clientId'),
        gc_region: params.get('gc_region'),
        gc_redirectUrl: params.get('gc_redirectUrl'),
        gcUsePopupAuth: params.get('gcUsePopupAuth'),
        debug: params.get('debug'),
        gcHostOrigin: params.get('gcHostOrigin'),
        gcTargetEnv: params.get('gcTargetEnv')
      };
    }

    function initialiseAndStorePluginConfiguration() {
      const params = getQueryParams();
      for (const [key, value] of Object.entries(params)) {
        if (value !== null) sessionStorage.setItem(key, value);
      }
      config = {
        gc_clientId: sessionStorage.getItem('gc_clientId'),
        gc_region: sessionStorage.getItem('gc_region'),
        gc_redirectUrl: sessionStorage.getItem('gc_redirectUrl'),
        gcUsePopupAuth: sessionStorage.getItem('gcUsePopupAuth'),
        debug: sessionStorage.getItem('debug'),
        gcHostOrigin: sessionStorage.getItem('gcHostOrigin'),
        gcTargetEnv: sessionStorage.getItem('gcTargetEnv')
      };
      updateStatus('Stored configuration: ' + JSON.stringify(config));
    }

    async function authenticateGenesys() {
      if (!config.gc_clientId || !config.gc_region || !config.gc_redirectUrl) {
        throw new Error('Missing required configuration parameters.');
      }
      client.setEnvironment(config.gc_region);
      client.setPersistSettings(true, 'homesPopupController');

      updateStatus('Authenticating with Genesys Cloud...');
      await client.loginImplicitGrant(config.gc_clientId, config.gc_redirectUrl);
      const user = await usersApi.getUsersMe();
      updateStatus(`Logged in as ${user.name}`);
      return user;
    }

    function openCrmTab(url) {
      const tab = window.open(url, '_blank');
      if (!tab) {
        pendingPopUrl = url;
        document.getElementById('openCrmBtn').style.display = 'inline-block';
        alert('Popup blocked! Click "Open CRM" button to continue.');
      }
      return tab;
    }

    async function checkExistingActiveCalls(user, counter = 0) {
      if (counter > existingCallMaxChecks) {
        updateStatus('Call control: Maximum number of checks reached.');
        return;
      }

      const activeCalls = await conversationsApi.getConversationsCalls();
      if (activeCalls?.total === 0) {
        await new Promise(r => setTimeout(r, existingCallCheckInterval));
        return checkExistingActiveCalls(user, counter + 1);
      }

      for (const call of activeCalls.entities || []) {
        const participants = call.participants || [];
        const agent = participants.find(p => p.purpose === 'agent' && p?.user?.id === user.id);
        const popUrl = participants.map(p => p.attributes?.UD_ScreenPop_URL).find(u => u);
        if (!popUrl) continue;
        if (agent?.state !== 'connected') continue;

        const connectedAgents = participants.filter(p => p.purpose==='agent' && p.state==='connected');
        connectedAgents.sort((a,b) => new Date(a.connectedTime) - new Date(b.connectedTime));
        const isFirstAgent = connectedAgents.length && connectedAgents[0].user?.id === agent.user?.id;

        if (isFirstAgent && !crmTab) {
          crmTab = openCrmTab(`${popUrl}?p2=${user.email}`);
          updateStatus('CRM tab opened from existing call.');
        }
      }
    }

    async function init() {
      try {
        const user = await authenticateGenesys();
        if (blockedAgentIds.includes(user.id)) {
          updateStatus(`Agent ${user.name} is blocked.`);
          return;
        }

        // Create WebSocket notifications
        const channel = await notificationsApi.postNotificationsChannels();
        const topic = `v2.users.${user.id}.conversations.calls`;
        await notificationsApi.putNotificationsChannelSubscriptions(channel.id, [{id: topic}]);
        updateStatus(`Subscribed to topic: ${topic}`);

        const socket = new WebSocket(channel.connectUri);
        socket.onopen = () => updateStatus('WebSocket connection opened.');
        socket.onerror = err => updateStatus('WebSocket error: ' + err.message);
        socket.onclose = () => updateStatus('WebSocket connection closed.');

        socket.onmessage = async (event) => {
          try {
            const data = JSON.parse(event.data);
            const interaction = data.eventBody;
            const agent = interaction.participants.find(p => p.purpose==='agent' && p.user?.id === user.id);
            const popUrl = interaction.participants.map(p=>p.attributes?.UD_ScreenPop_URL).find(u=>u);

            if (!agent) return;

            // Open CRM tab on connect
            if (agent.state==='connected' && popUrl && !crmTab) {
              const connectedAgents = interaction.participants.filter(p => p.purpose==='agent' && p.state==='connected');
              connectedAgents.sort((a,b)=>new Date(a.connectedTime)-new Date(b.connectedTime));
              const isFirstAgent = connectedAgents[0]?.user?.id === agent.user?.id;
              if (isFirstAgent) crmTab = openCrmTab(`${popUrl}?p2=${user.email}`);
            }

            // Close tab on wrap-up
            if ((agent.state==='disconnected' || agent.state==='terminated') && crmTab && !crmTab.closed) {
              crmTab.close();
              crmTab = null;
              updateStatus('CRM tab closed after call.');
            }

          } catch (err) {
            console.error(err);
            updateStatus('Error processing event.');
          }
        };

        checkExistingActiveCalls(user, 0);

      } catch (err) {
        updateStatus('Initialization error: ' + err.message);
      }
    }

    // Setup
    initialiseAndStorePluginConfiguration();

    document.getElementById('openCrmBtn').addEventListener('click', () => {
      if (pendingPopUrl) {
        crmTab = openCrmTab(pendingPopUrl);
        pendingPopUrl = null;
        document.getElementById('openCrmBtn').style.display = 'none';
      }
    });

    // Start init after DOM is ready
    window.addEventListener('DOMContentLoaded', () => {
      updateStatus(`HOMES Popup Controller v${VERSION} loaded.`);
      init();
    });

  </script>
</body>
</html>
