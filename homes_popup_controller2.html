<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HOMES Client App (No Login)</title>
  <script src="purecloud-platform-client-v2.min.js"></script>
  <script src="https://sdk-cdn.mypurecloud.com/client-apps/2.6.7/purecloud-client-app-sdk.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    #statusBox { 
      background: #f5f5f5; 
      padding: 15px; 
      border-radius: 5px; 
      max-width: 600px; 
    }
    #statusBox p { margin: 5px 0; }
  </style>
</head>
<body>
  <h2>HOMES Client App Status</h2>
  <div id="statusBox">
    <p>Initializing...</p>
  </div>

  <script>
    const VERSION = '1.3.0';

    function updateStatus(message) {
      const statusBox = document.getElementById('statusBox');
      if (statusBox) {
        const p = document.createElement('p');
        p.textContent = message;
        statusBox.appendChild(p);
      }
      console.log('[HOMES Client]', message);
    }

    // -------------------------------
    // 1️⃣ Query parameter handling
    // -------------------------------
    function getQueryParams() {
      const params = new URLSearchParams(window.location.search);
      return {
        gcHostOrigin: params.get('gcHostOrigin'),
        gcTargetEnv: params.get('gcTargetEnv')
      };
    }

    const config = getQueryParams();
    updateStatus(`Loaded configuration: ${JSON.stringify(config)}`);

    // -------------------------------
    // 2️⃣ Initialize Client App SDK
    // -------------------------------
    const ClientApp = window.purecloud.apps.ClientApp;
    const myClientApp = new ClientApp({
      gcHostOrigin: config.gcHostOrigin,
      gcTargetEnv: config.gcTargetEnv
    });

    // -------------------------------
    // 3️⃣ Fetch current Genesys Cloud user
    // -------------------------------
    myClientApp.lifecycle.addBootstrapListener(async () => {
      updateStatus(`Client App SDK bootstrapped (v${VERSION}).`);

      try {
        const platformClient = require('platformClient');
        const client = platformClient.ApiClient.instance;
        client.setPersistSettings(true, 'homesClientNoLogin');

        const usersApi = new platformClient.UsersApi();
        const user = await usersApi.getUsersMe();

        updateStatus(`Logged in as: ${user.name} (email: ${user.email})`);
      } catch (err) {
        console.error('[HOMES Client] Error fetching user:', err);
        updateStatus(`Error fetching user: ${err.message}`);
      }

      myClientApp.lifecycle.bootstrapped();
    });

    myClientApp.lifecycle.addStopListener(() => {
      updateStatus('Client App SDK stopped.');
      myClientApp.lifecycle.stopped();
    });
  </script>
</body>
</html>
