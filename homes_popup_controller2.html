<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HOMES Popup Controller</title>
<script src="https://sdk-cdn.mypurecloud.com/javascript/221.0.0/purecloud-platform-client-v2.min.js"></script>
<script src="https://sdk-cdn.mypurecloud.com/client-apps/2.6.7/purecloud-client-app-sdk.js"></script>
<style>
.info-container { background-color: #f5f5f5; padding: 20px; border-radius: 5px; margin-bottom: 20px; font-family: Arial, sans-serif; font-size: 14px; }
.info-container p { margin: 5px 0; }
</style>
</head>
<body>
<div class="info-container" id="statusBox">
<p><strong>Status:</strong> Initializing HOMES Popup Controller...</p>
</div>

<script>
const VERSION = '1.0.3';
const blockedAgentIds = ['a45dcb75-1121-4fb0-b956-3fb9437e539e'];
let crmTab = null;

function updateStatus(msg) {
  const p = document.createElement('p');
  p.textContent = msg;
  document.getElementById('statusBox').appendChild(p);
}

function getQueryParams() {
  const params = new URLSearchParams(window.location.search);
  return {
    gc_clientId: params.get('gc_clientId'),
    gc_region: params.get('gc_region'),
    gc_redirectUrl: params.get('gc_redirectUrl'),
    gcHostOrigin: params.get('gcHostOrigin'),
    gcTargetEnv: params.get('gcTargetEnv')
  };
}

const config = getQueryParams();
updateStatus(`HOMES Popup Controller v${VERSION}`);

const client = platformClientV2.ApiClient.instance;
const notificationsApi = new platformClientV2.NotificationsApi();
const conversationsApi = new platformClientV2.ConversationsApi();
const usersApi = new platformClientV2.UsersApi();

// Open popup helper
function openCRM(url, email) {
  if (!crmTab || crmTab.closed) crmTab = window.open('about:blank', '_blank');
  const fullUrl = new URL(url);
  fullUrl.searchParams.set('p2', email);
  crmTab.location.href = fullUrl.toString();
  updateStatus(`Opening HOMES tab: ${fullUrl.toString()}`);
}

function isFirstAgent(participants, userId) {
  const connected = participants.filter(p => p.purpose==='agent' && p.state==='connected');
  connected.sort((a,b)=>new Date(a.connectedTime)-new Date(b.connectedTime));
  return connected[0]?.user?.id === userId;
}

async function init() {
  try {
    client.setEnvironment(config.gc_region);
    client.setPersistSettings(true,'homesPopupController');
    updateStatus('Authenticating...');
    await client.loginImplicitGrant(config.gc_clientId, config.gc_redirectUrl, {usePopup:true});
    updateStatus('Authenticated.');

    const user = await usersApi.getUsersMe();
    updateStatus(`Logged in as: ${user.name}`);
    if (blockedAgentIds.includes(user.id)) return updateStatus(`Agent blocked.`);

    // Create notification channel
    const channel = await notificationsApi.postNotificationsChannels();
    await notificationsApi.putNotificationsChannelSubscriptions(channel.id,[{id:`v2.users.${user.id}.conversations.calls`}]);
    updateStatus('Subscribed to call events.');

    const socket = new WebSocket(channel.connectUri);
    socket.onmessage = async event => {
      try {
        const data = JSON.parse(event.data);
        const participants = data.eventBody?.participants || [];
        const agent = participants.find(p=>p.purpose==='agent' && p.user?.id===user.id);
        if (!agent) return;

        const popUrl = participants.map(p=>p.attributes?.UD_ScreenPop_URL).find(u=>u);
        if(agent.state==='connected' && popUrl && isFirstAgent(participants,user.id)) openCRM(popUrl,user.email);
        if((agent.state==='disconnected'||agent.state==='terminated') && crmTab && !crmTab.closed){ crmTab.close(); crmTab=null; updateStatus('Closing HOMES tab.'); }
      } catch(e){console.error(e);}
    };

    // Check active calls on startup
    const calls = await conversationsApi.getConversationsCalls();
    calls.entities.forEach(call=>{
      const participants = call.participants||[];
      const agent = participants.find(p=>p.purpose==='agent' && p.user?.id===user.id);
      if(agent?.state==='connected'){
        const popUrl = participants.map(p=>p.attributes?.UD_ScreenPop_URL).find(u=>u);
        if(popUrl) openCRM(popUrl,user.email);
      }
    });

  } catch(err){console.error(err); updateStatus(`Error: ${err.message}`);}
}

// ClientApp bootstrap
const myClientApp = new window.purecloud.apps.ClientApp({gcHostOrigin:config.gcHostOrigin,gcTargetEnv:config.gcTargetEnv});
myClientApp.lifecycle.addBootstrapListener(()=>{
  updateStatus('Application bootstrapped.');
  crmTab = window.open('about:blank','_blank'); // allow future popups
  init();
  myClientApp.lifecycle.bootstrapped();
});
myClientApp.lifecycle.addStopListener(()=>{
  updateStatus('Application stopped.');
  if(crmTab && !crmTab.closed){ crmTab.close(); crmTab=null; }
  myClientApp.lifecycle.stopped();
});
</script>
</body>
</html>
