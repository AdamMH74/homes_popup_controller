<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HOMES Popup Controller v2.0</title>
<script src="purecloud-platform-client-v2.min.js"></script>
<script src="https://sdk-cdn.mypurecloud.com/client-apps/2.6.7/purecloud-client-app-sdk.js"></script>
<style>
.info-container {
  background-color: #f5f5f5;
  padding: 20px;
  border-radius: 5px;
  margin-bottom: 20px;
  font-family: Arial, sans-serif;
  font-size: 14px;
}
.info-container p {
  margin: 5px 0;
}
</style>
</head>
<body>
<div class="info-container" id="statusBox">
  <p><strong>Status:</strong> Initializing HOMES Popup Controller...</p>
</div>

<script>
const VERSION = '2.0.0';
const DEBUG = true;

const blockedAgentIds = [
  'a45dcb75-1121-4fb0-b956-3fb9437e539e'
];

const existingCallCheckInterval = 2500;
const existingCallMaxChecks = 20;

let config = null;
let crmTab = null;
let socket = null;

// ====================== UTIL ======================
function log(...args) {
  if (DEBUG) console.log('[HOMES]', ...args);
}

function updateStatus(message) {
  const box = document.getElementById('statusBox');
  const p = document.createElement('p');
  p.textContent = message;
  box.appendChild(p);
}

// ====================== CONFIG ======================
function getQueryParams() {
  const params = new URLSearchParams(window.location.search);
  return Object.fromEntries(params.entries());
}

function storeConfig() {
  const params = getQueryParams();
  Object.entries(params).forEach(([k, v]) => sessionStorage.setItem(k, v));
}

function getConfig() {
  return {
    gc_clientId: sessionStorage.getItem('gc_clientId'),
    gc_region: sessionStorage.getItem('gc_region'),
    gc_redirectUrl: sessionStorage.getItem('gc_redirectUrl'),
    gcHostOrigin: sessionStorage.getItem('gcHostOrigin'),
    gcTargetEnv: sessionStorage.getItem('gcTargetEnv'),
    debug: sessionStorage.getItem('debug')
  };
}

// ====================== TAB CONTROL ======================
function openPlaceholderTab() {
  if (!crmTab || crmTab.closed) {
    crmTab = window.open('about:blank', 'Home_CRM');
    log('Placeholder tab opened');
  }
}

function openCRM(url) {
  if (!url) return;
  if (crmTab && !crmTab.closed) {
    crmTab.focus();
  } else {
    crmTab = window.open('about:blank', 'Home_CRM');
  }
  setTimeout(() => {
    if (crmTab && !crmTab.closed) {
      crmTab.location.href = url;
      crmTab.focus();
    }
  }, 100);
}

function closeCRM() {
  if (crmTab && !crmTab.closed) {
    crmTab.close();
    crmTab = null;
    updateStatus('CRM tab closed');
  }
}

// ====================== CORE LOGIC ======================
function isFirstAgent(participants, userId) {
  const agents = participants
    .filter(p => p.purpose === 'agent' && p.state === 'connected')
    .sort((a, b) => new Date(a.connectedTime) - new Date(b.connectedTime));
  return agents[0]?.user?.id === userId;
}

async function checkExistingCalls(user, conversationsApi) {
  for (let i = 0; i < existingCallMaxChecks; i++) {
    const calls = await conversationsApi.getConversationsCalls();
    if (calls?.total > 0) {
      for (const call of calls.entities || []) {
        const participants = call.participants || [];
        const agent = participants.find(p => p.purpose === 'agent' && p.user?.id === user.id);
        const popUrl = participants.map(p => p.attributes?.UD_ScreenPop_URL).find(Boolean);
        if (!agent || !popUrl || agent.state !== 'connected') continue;
        if (isFirstAgent(participants, user.id)) {
          const url = new URL(popUrl);
          url.searchParams.set('p2', user.email);
          updateStatus(`Opening CRM (existing call)`);
          openCRM(url.toString());
          return;
        }
      }
    }
    await new Promise(r => setTimeout(r, existingCallCheckInterval));
  }
  updateStatus('No active calls detected after max checks');
}

// ====================== INIT ======================
async function init(clientApp) {
  const platformClient = require('platformClient');
  const client = platformClient.ApiClient.instance;
  const notificationsApi = new platformClient.NotificationsApi();
  const conversationsApi = new platformClient.ConversationsApi();
  const usersApi = new platformClient.UsersApi();

  client.setEnvironment(config.gc_region);
  client.setPersistSettings(true, 'homesPopupController');

  updateStatus('Authenticating...');
  await client.loginImplicitGrant(config.gc_clientId, config.gc_redirectUrl, { usePopup: true });

  const user = await usersApi.getUsersMe();
  updateStatus(`Logged in: ${user.name}`);

  if (blockedAgentIds.includes(user.id)) {
    updateStatus('Agent blocked');
    return;
  }

  // Notifications
  const channel = await notificationsApi.postNotificationsChannels();
  const topic = `v2.users.${user.id}.conversations.calls`;
  await notificationsApi.putNotificationsChannelSubscriptions(channel.id, [{ id: topic }]);

  socket = new WebSocket(channel.connectUri);
  socket.onopen = () => updateStatus('WebSocket connected');
  socket.onmessage = (event) => {
    const data = JSON.parse(event.data);
    const interaction = data.eventBody;
    if (!interaction) return;
    const participants = interaction.participants || [];
    const agent = participants.find(p => p.purpose === 'agent' && p.user?.id === user.id);
    if (!agent) return;
    const popUrl = participants.map(p => p.attributes?.UD_ScreenPop_URL).find(Boolean);
    if (agent.state === 'connected' && popUrl && isFirstAgent(participants, user.id)) {
      const url = new URL(popUrl);
      url.searchParams.set('p2', user.email);
      updateStatus('Opening CRM (live event)');
      openCRM(url.toString());
    }
    if (['disconnected', 'terminated'].includes(agent.state)) {
      closeCRM();
    }
  };
  socket.onerror = () => updateStatus('WebSocket error');
  socket.onclose = () => updateStatus('WebSocket closed');

  // Existing calls check
  checkExistingCalls(user, conversationsApi);
}

// ====================== SDK TIMING FIX ======================
function waitForPureCloudSDK(callback) {
  const maxAttempts = 50;
  let attempts = 0;
  const interval = setInterval(() => {
    if (window.purecloud?.apps?.ClientApp) {
      clearInterval(interval);
      callback();
    } else {
      attempts++;
      if (attempts >= maxAttempts) {
        clearInterval(interval);
        updateStatus('ERROR: PureCloud SDK not available');
        console.error('PureCloud SDK failed to load');
      }
    }
  }, 100);
}

// ====================== LIFECYCLE ======================
storeConfig();
config = getConfig();

waitForPureCloudSDK(() => {
  const ClientApp = window.purecloud.apps.ClientApp;
  const app = new ClientApp({
    gcHostOrigin: config.gcHostOrigin,
    gcTargetEnv: config.gcTargetEnv
  });

  app.lifecycle.addBootstrapListener(() => {
    updateStatus(`HOMES v${VERSION} bootstrapped`);
    openPlaceholderTab();

    const wait = () => {
      if (app.client) init(app.client);
      else setTimeout(wait, 100);
    };
    wait();
    app.lifecycle.bootstrapped();
  });

  app.lifecycle.addStopListener(() => {
    closeCRM();
    if (socket && socket.readyState === WebSocket.OPEN) socket.close();
    app.lifecycle.stopped();
  });
});

window.addEventListener('beforeunload', () => {
  closeCRM();
  if (socket && socket.readyState === WebSocket.OPEN) socket.close();
});
</script>
</body>
</html>
