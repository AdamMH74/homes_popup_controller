<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HOMES Popup Controller</title>
  
  <script src="https://sdk-cdn.mypurecloud.com/client-apps/2.6.7/purecloud-client-app-sdk.js"></script>
  
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      margin: 15px;
      background-color: #f8f9fa;
    }
    .info-container {
      background-color: #f5f5f5;
      padding: 18px;
      border-radius: 6px;
      margin-bottom: 20px;
      border-left: 4px solid #007bff;
      max-height: 420px;
      overflow-y: auto;
    }
    .info-container p {
      margin: 6px 0;
      font-size: 14px;
      line-height: 1.4;
    }
    #openButton {
      padding: 14px 28px;
      font-size: 16px;
      font-weight: 600;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      width: 100%;
      transition: background-color 0.2s;
    }
    #openButton:hover:not(:disabled) {
      background-color: #0056b3;
    }
    #openButton:disabled {
      background-color: #6c757d;
      cursor: not-allowed;
    }
    .highlight {
      color: #007bff;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="info-container" id="statusBox">
    <p><strong>Status:</strong> Initializing HOMES Popup Controller v1.0.7...</p>
  </div>
  
  <button id="openButton" disabled>Open HOMES CRM</button>

  <script>
    const VERSION = '1.0.7';
    const BLOCKED_AGENT_IDS = ['a45dcb75-1121-4fb0-b956-3fb9437e539e'];

    let crmTab = null;
    let socket = null;
    let userEmail = null;
    let currentPopUrl = null;
    let me = null;

    const statusBox = document.getElementById('statusBox');
    const openButton = document.getElementById('openButton');

    const updateStatus = (message, isHighlight = false) => {
      const p = document.createElement('p');
      p.className = isHighlight ? 'highlight' : '';
      p.innerHTML = `<strong>[${new Date().toLocaleTimeString()}]</strong> ${message}`;
      statusBox.appendChild(p);
      statusBox.scrollTop = statusBox.scrollHeight;
      console.log('[HOMES Popup Controller]', message);
    };

    const openHOMES = () => {
      if (!currentPopUrl) {
        updateStatus('No HOMES URL available yet. Wait for a call to be connected.', true);
        return;
      }

      try {
        const url = new URL(currentPopUrl);
        if (userEmail) {
          url.searchParams.set('p2', userEmail);
        }

        // Open or refresh the tab
        if (crmTab && !crmTab.closed) {
          crmTab.location.href = url.toString();
          updateStatus('HOMES CRM tab refreshed', true);
        } else {
          crmTab = window.open(url.toString(), 'HOMES_CRM');
          updateStatus('✅ HOMES CRM opened in new tab', true);
        }

        openButton.disabled = true;
      } catch (err) {
        updateStatus('Error: Invalid HOMES URL', true);
        console.error(err);
      }
    };

    const closeCRMTab = () => {
      if (crmTab && !crmTab.closed) {
        crmTab.close();
      }
      crmTab = null;
      currentPopUrl = null;
      openButton.disabled = true;
    };

    // Store Genesys Cloud configuration
    const initialiseAndStorePluginConfiguration = () => {
      const params = new URLSearchParams(window.location.search);
      const keys = ['gc_clientId', 'gc_region', 'gc_redirectUrl', 'gcHostOrigin', 'gcTargetEnv'];

      keys.forEach(key => {
        const value = params.get(key);
        if (value) sessionStorage.setItem(key, value);
      });
    };

    const getStoredConfig = () => ({
      gc_clientId: sessionStorage.getItem('gc_clientId'),
      gc_region: sessionStorage.getItem('gc_region'),
      gc_redirectUrl: sessionStorage.getItem('gc_redirectUrl'),
      gcHostOrigin: sessionStorage.getItem('gcHostOrigin'),
      gcTargetEnv: sessionStorage.getItem('gcTargetEnv')
    });

    async function initialize(client) {
      try {
        me = await client.get('/api/v2/users/me');
        userEmail = me.email;

        updateStatus(`Logged in as: <strong>${me.name}</strong>`, true);

        if (BLOCKED_AGENT_IDS.includes(me.id)) {
          updateStatus('❌ This agent is blocked from using the HOMES widget', true);
          return;
        }

        // Setup notification channel for calls
        const channel = await client.post('/api/v2/notifications/channels');
        const topic = `v2.users.${me.id}.conversations.calls`;

        await client.put(`/api/v2/notifications/channels/${channel.id}/subscriptions`, [{ id: topic }]);

        // WebSocket for real-time call events
        socket = new WebSocket(channel.connectUri);

        socket.onopen = () => updateStatus('WebSocket connected');
        socket.onclose = () => updateStatus('WebSocket closed');
        socket.onerror = () => updateStatus('WebSocket error');

        socket.onmessage = (event) => {
          try {
            const data = JSON.parse(event.data);
            if (!data.eventBody?.participants) return;

            const participants = data.eventBody.participants;
            const agentPart = participants.find(p => 
              p.purpose === 'agent' && p.user?.id === me.id
            );

            if (!agentPart) return;

            const popUrl = participants
              .map(p => p.attributes?.UD_ScreenPop_URL)
              .find(u => u && u.startsWith('http'));

            if (agentPart.state === 'connected' && popUrl) {
              currentPopUrl = popUrl;
              openButton.disabled = false;
              updateStatus('✅ Call connected – Click the button to open HOMES CRM', true);
            }

            // Close logic when call ends
            if ((agentPart.state === 'disconnected' || agentPart.state === 'terminated') 
                && agentPart.wrapup) {
              updateStatus('Call ended – HOMES tab will close on next open if needed');
              closeCRMTab();
            }
          } catch (e) {
            console.error('WebSocket message error:', e);
          }
        };

      } catch (err) {
        updateStatus(`Initialization error: ${err.message}`, true);
        console.error(err);
      }
    }

    // ====================== CLIENT APP LIFECYCLE ======================
    initialiseAndStorePluginConfiguration();
    const config = getStoredConfig();

    const ClientApp = window.purecloud.apps.ClientApp;
    const myClientApp = new ClientApp({
      gcHostOrigin: config.gcHostOrigin,
      gcTargetEnv: config.gcTargetEnv
    });

    myClientApp.lifecycle.addBootstrapListener(() => {
      updateStatus('Application bootstrapped successfully');
      myClientApp.lifecycle.bootstrapped();
    });

    myClientApp.lifecycle.addStopListener(() => {
      updateStatus('Application stopping...');
      closeCRMTab();
      if (socket && socket.readyState === WebSocket.OPEN) socket.close();
      myClientApp.lifecycle.stopped();
    });

    // Cleanup
    window.addEventListener('beforeunload', () => {
      closeCRMTab();
      if (socket && socket.readyState === WebSocket.OPEN) socket.close();
    });

    // Button click handler
    openButton.addEventListener('click', openHOMES);

    updateStatus(`HOMES Popup Controller v${VERSION} ready`);
    updateStatus('Waiting for an active call to enable the Open HOMES CRM button...');
  </script>
</body>
</html>
