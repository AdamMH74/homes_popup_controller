<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HOMES Client</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #f8f8f8; }
    #statusBox { 
      border: 1px solid #ccc; 
      padding: 15px; 
      background: white; 
      min-height: 350px;
      font-family: monospace;
      white-space: pre-wrap;
      overflow: auto;
    }
  </style>
</head>
<body>

  <h2>HOMES Client Debug</h2>
  <div id="statusBox"></div>

  <!-- SDKs - MUST be loaded BEFORE your script -->
  <script src="https://sdk-cdn.mypurecloud.com/javascript/latest/purecloud-platform-client-v2.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/purecloud-client-app-sdk@latest/dist/purecloud-client-app-sdk.min.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const VERSION = '1.2.1';

      function updateStatus(message, replaceLast = false) {
        const statusBox = document.getElementById('statusBox');
        if (!statusBox) {
          console.log('[HOMES Client]', message);
          return;
        }
        if (replaceLast && statusBox.lastChild) {
          statusBox.lastChild.textContent = message;
        } else {
          const p = document.createElement('p');
          p.textContent = message;
          statusBox.appendChild(p);
        }
        console.log('[HOMES Client]', message);
      }

      // -------------------------------
      // 1️⃣ Query parameter handling
      // -------------------------------
      function getQueryParams() {
        const params = new URLSearchParams(window.location.search);
        return {
          gc_clientId: params.get('gc_clientId'),
          gc_region: params.get('gc_region'),
          gc_redirectUrl: params.get('gc_redirectUrl'),
          gcUsePopupAuth: params.get('gcUsePopupAuth'),
          debug: params.get('debug'),
          gcHostOrigin: params.get('gcHostOrigin'),
          gcTargetEnv: params.get('gcTargetEnv')
        };
      }

      function initialiseAndStorePluginConfiguration() {
        const params = getQueryParams();
        for (const [key, value] of Object.entries(params)) {
          if (value !== null) sessionStorage.setItem(key, value);
        }
        updateStatus('Stored query parameters in sessionStorage.');
      }

      function getStoredConfig() {
        const config = {
          gc_clientId: sessionStorage.getItem('gc_clientId'),
          gc_region: sessionStorage.getItem('gc_region'),
          gc_redirectUrl: sessionStorage.getItem('gc_redirectUrl'),
          gcUsePopupAuth: sessionStorage.getItem('gcUsePopupAuth'),
          debug: sessionStorage.getItem('debug'),
          gcHostOrigin: sessionStorage.getItem('gcHostOrigin'),
          gcTargetEnv: sessionStorage.getItem('gcTargetEnv')
        };
        updateStatus('Retrieved configuration from sessionStorage.');
        return config;
      }

      // -------------------------------
      // 2️⃣ Initialize config
      // -------------------------------
      initialiseAndStorePluginConfiguration();
      const config = getStoredConfig();
      updateStatus(`Loaded configuration: ${JSON.stringify(config)}`);

      if (!config.gc_clientId || !config.gc_redirectUrl) {
        updateStatus('Error: Missing required configuration: gc_clientId or gc_redirectUrl', true);
        return;
      }

      // -------------------------------
      // 3️⃣ Initialize Platform Client
      // -------------------------------
      const platformClient = window.purecloud?.platformClient || window.platformClient;
      if (!platformClient) {
        updateStatus('ERROR: Platform Client SDK not loaded. Check script tags.', true);
        return;
      }

      const client = platformClient.ApiClient.instance;
      client.setEnvironment(config.gc_region || 'mypurecloud.com');
      client.setPersistSettings(true, 'homesClient');

      const usersApi = new platformClient.UsersApi();

      // -------------------------------
      // 4️⃣ Initialize PureCloud Client App SDK
      // -------------------------------
      const ClientApp = window.purecloud?.apps?.ClientApp || window.ClientApp;
      const myClientApp = ClientApp ? new ClientApp({
        gcHostOrigin: config.gcHostOrigin,
        gcTargetEnv: config.gcTargetEnv
      }) : null;

      // -------------------------------
      // 5️⃣ Authenticate and fetch user
      // -------------------------------
      async function fetchCurrentUser() {
        try {
          updateStatus('Authenticating...', true);
          
          await client.loginImplicitGrant(
            config.gc_clientId,
            config.gc_redirectUrl,
            config.gcUsePopupAuth === 'true'
          );

          updateStatus('Authentication successful.', true);

          const user = await usersApi.getUsersMe();
          updateStatus(`Logged in as: ${user.name}`, true);
          updateStatus(`Email: ${user.email}`, true);
          console.log('Current user:', user);

          if (myClientApp) {
            updateStatus('Client App SDK bootstrapped.', true);
            myClientApp.lifecycle.bootstrapped();
          }
        } catch (err) {
          console.error('[HOMES Client] Error:', err);
          updateStatus(`Error: ${err.message || err}`, true);
        }
      }

      // -------------------------------
      // 6️⃣ Lifecycle listeners
      // -------------------------------
      if (myClientApp) {
        myClientApp.lifecycle.addBootstrapListener(async () => {
          updateStatus(`Client App SDK bootstrapped (v${VERSION}).`, true);
          myClientApp.lifecycle.bootstrapped();
          await fetchCurrentUser();
        });

        myClientApp.lifecycle.addStopListener(() => {
          updateStatus('Client App SDK stopped.', true);
          myClientApp.lifecycle.stopped();
        });
      } else {
        // Fallback when testing outside Genesys Cloud
        updateStatus('Running in standalone mode (no ClientApp SDK)');
        fetchCurrentUser();
      }
    });
  </script>
</body>
</html>
