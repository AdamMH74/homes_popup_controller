<script>
const VERSION = '2.0.0';

// ====================== GLOBAL STATE ======================

let platformClient = window.platformClient || (window.require ? window.require('platformClient') : null);
let client = platformClient?.ApiClient.instance;

let notificationsApi, conversationsApi, usersApi;
let currentUser = null;
let channel = null;

// ====================== UI ======================

function updateStatus(message, type = 'info') {
  const box = document.getElementById('statusBox');
  if (!box) return;

  const p = document.createElement('p');
  p.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
  p.classList.add(type);
  box.appendChild(p);
  box.scrollTop = box.scrollHeight;

  console.log(`[HOMES v${VERSION}]`, message);
}

// ====================== TOKEN MANAGER ======================

const tokenManager = {
  token: null,
  expiry: 0,
  timer: null,

  init(token, expiresIn) {
    this.token = token;
    this.expiry = Date.now() + expiresIn * 1000;
    this.schedule();
  },

  schedule() {
    const delay = Math.max(this.expiry - Date.now() - 60000, 5000);
    updateStatus(`Token refresh in ${Math.round(delay / 1000)}s`);

    clearTimeout(this.timer);
    this.timer = setTimeout(() => this.refresh(), delay);
  },

  refresh() {
    updateStatus('Refreshing token...', 'warning');

    const config = JSON.parse(localStorage.getItem('homesConfig') || '{}');
    const oauthHost = `login.${config.gc_region}`;

    window.location.href =
      `https://${oauthHost}/oauth/authorize?response_type=token` +
      `&client_id=${encodeURIComponent(config.gc_clientId)}` +
      `&redirect_uri=${encodeURIComponent(config.gc_redirectUrl)}`;
  },

  get() {
    return this.token;
  }
};

// ====================== TAB MANAGER ======================

const tabManager = {
  tab: null,
  lastUrl: null,
  opening: false,

  open(popUrl, email) {
    if (!popUrl) return;

    if (popUrl === this.lastUrl) {
      updateStatus('Duplicate pop prevented');
      return;
    }

    if (this.opening || this.isOpen()) {
      updateStatus('Tab already open');
      return;
    }

    this.opening = true;
    this.lastUrl = popUrl;

    const url = new URL(popUrl);
    url.searchParams.set('p2', email || '');

    const handleReady = (event) => {
      const expectedOrigin = new URL(popUrl).origin;

      if (
        event.source === this.tab &&
        event.origin === expectedOrigin &&
        event.data?.type === 'homesReady'
      ) {
        this.tab.postMessage({
          type: 'homesConfig',
          config: JSON.parse(localStorage.getItem('homesConfig') || '{}'),
          token: tokenManager.get()
        }, expectedOrigin);

        updateStatus('Config sent to CRM tab', 'success');
        window.removeEventListener('message', handleReady);
      }
    };

    window.addEventListener('message', handleReady);

    this.tab = window.open(url.toString(), '_blank');

    setTimeout(() => this.opening = false, 1500);

    updateStatus('CRM tab opened', 'success');
  },

  isOpen() {
    return this.tab && !this.tab.closed;
  },

  close() {
    if (this.isOpen()) this.tab.close();
    this.tab = null;
    this.lastUrl = null;
  }
};

// ====================== WEBSOCKET ======================

const wsManager = {
  socket: null,
  attempts: 0,

  connect(channel) {
    this.socket = new WebSocket(channel.connectUri);

    this.socket.onopen = () => {
      this.attempts = 0;
      updateStatus('WebSocket connected', 'success');
    };

    this.socket.onmessage = handleNotification;

    this.socket.onclose = () => {
      updateStatus('WebSocket closed', 'warning');
      this.reconnect(channel);
    };

    this.socket.onerror = () => {
      updateStatus('WebSocket error', 'error');
    };
  },

  reconnect(channel) {
    const delay = Math.min(1000 * 2 ** this.attempts, 15000);
    this.attempts++;

    updateStatus(`Reconnect in ${delay / 1000}s`);

    setTimeout(() => this.connect(channel), delay);
  },

  close() {
    if (this.socket) this.socket.close();
  }
};

// ====================== NOTIFICATIONS ======================

function handleNotification(evt) {
  try {
    const data = JSON.parse(evt.data);
    const interaction = data.eventBody;
    if (!interaction?.participants) return;

    const participants = interaction.participants;

    const agent = participants.find(
      p => p.purpose === 'agent' && p.user?.id === currentUser.id
    );

    const popUrl = participants
      .map(p => p.attributes?.UD_ScreenPop_URL)
      .find(Boolean);

    if (!agent) return;

    if (agent.state === 'connected' && popUrl) {
      tabManager.open(popUrl, currentUser.email);
    }

    if (
      (agent.state === 'disconnected' || agent.state === 'terminated')
    ) {
      tabManager.close();
      updateStatus('Closed CRM tab');
    }

  } catch (e) {
    console.error(e);
  }
}

// ====================== TOKEN PARSING ======================

function parseToken() {
  const hash = new URLSearchParams(window.location.hash.substring(1));
  let token = hash.get('access_token');
  let expires = parseInt(hash.get('expires_in') || '3600', 10);

  if (token) {
    localStorage.setItem('homesToken', token);
    localStorage.setItem('homesExpiry', Date.now() + expires * 1000);
  } else {
    token = localStorage.getItem('homesToken');
    const expiry = parseInt(localStorage.getItem('homesExpiry'), 10);
    if (!token || Date.now() > expiry) token = null;
    else expires = (expiry - Date.now()) / 1000;
  }

  return { token, expires };
}

// ====================== INIT ======================

async function init() {
  try {
    updateStatus('Initializing...');

    const params = new URLSearchParams(window.location.search);

    const config = {
      gc_clientId: params.get('gc_clientId'),
      gc_region: params.get('gc_region'),
      gc_redirectUrl: params.get('gc_redirectUrl')
    };

    if (!config.gc_clientId) {
      Object.assign(config, JSON.parse(localStorage.getItem('homesConfig') || '{}'));
    }

    if (!config.gc_clientId) {
      updateStatus('Missing config', 'error');
      return;
    }

    localStorage.setItem('homesConfig', JSON.stringify(config));

    const { token, expires } = parseToken();

    if (!token) {
      const oauthHost = `login.${config.gc_region}`;

      window.location.href =
        `https://${oauthHost}/oauth/authorize?response_type=token` +
        `&client_id=${encodeURIComponent(config.gc_clientId)}` +
        `&redirect_uri=${encodeURIComponent(config.gc_redirectUrl)}`;
      return;
    }

    tokenManager.init(token, expires);

    client.setEnvironment(`api.${config.gc_region}`);
    client.setAccessToken(tokenManager.get());

    notificationsApi = new platformClient.NotificationsApi();
    conversationsApi = new platformClient.ConversationsApi();
    usersApi = new platformClient.UsersApi();

    currentUser = await usersApi.getUsersMe();

    updateStatus(`Logged in as ${currentUser.name}`, 'success');

    channel = await notificationsApi.postNotificationsChannels();

    await notificationsApi.putNotificationsChannelSubscriptions(channel.id, [
      { id: `v2.users.${currentUser.id}.conversations.calls` }
    ]);

    wsManager.connect(channel);

    updateStatus('System ready', 'success');

  } catch (err) {
    console.error(err);
    updateStatus(err.message, 'error');
  }
}

// ====================== CLEANUP ======================

function logout() {
  localStorage.clear();
  wsManager.close();
  tabManager.close();
  window.location.reload();
}

window.onload = init;

window.addEventListener('beforeunload', () => {
  wsManager.close();
  tabManager.close();
});
</script>
