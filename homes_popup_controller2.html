<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HOMES Client & Popup Controller</title>

  <script src="https://sdk-cdn.mypurecloud.com/javascript/221.0.0/purecloud-platform-client-v2.min.js"></script>
  <script src="https://sdk-cdn.mypurecloud.com/client-apps/2.6.7/purecloud-client-app-sdk.js"></script>

  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: #f8f9fa;
      color: #333;
    }
    h1 { color: #0052cc; margin-bottom: 8px; }
    .subtitle { color: #666; margin-bottom: 20px; font-size: 15px; }

    #statusBox {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 20px;
      max-width: 920px;
      max-height: 75vh;
      overflow-y: auto;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      line-height: 1.55;
      font-size: 14px;
    }
    #statusBox p { margin: 8px 0; padding: 6px 10px; border-radius: 4px; }

    .error   { background: #ffebee; color: #c62828; border-left: 5px solid #c62828; }
    .success { background: #e8f5e9; color: #2e7d32; border-left: 5px solid #2e7d32; }
    .info    { background: #e3f2fd; color: #1565c0; border-left: 5px solid #1565c0; }
    .warning { background: #fff3e0; color: #ef6c00; border-left: 5px solid #ef6c00; }

    button {
      margin-top: 15px;
      padding: 10px 24px;
      background-color: #0052cc;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover { background-color: #003d99; }
    button:disabled { background-color: #888; cursor: not-allowed; }

    .version { font-size: 12px; color: #888; margin-top: 12px; }
  </style>
</head>

<body>
<h1>HOMES Client & Popup Controller</h1>
<p class="subtitle">Genesys Cloud Integration • Version <span id="appVersion">1.3.1</span></p>

<div id="statusBox">
  <p class="info">Initializing HOMES Client & Popup Controller...</p>
</div>

<button id="openHomesBtn" disabled>Open HOMES CRM</button>
<button onclick="logout()">Logout & Clear Token</button>

<div class="version">
  SDK: purecloud-platform-client-v2 • Implicit Grant (Consider migrating to PKCE)
</div>

<script>
const VERSION = '1.4.0';
const BLOCKED_AGENT_IDS = ['a45dcb75-1121-4fb0-b956-3fb9437e539e'];

let crmTab = null;
let platformClient = window.platformClient || (window.require ? window.require('platformClient') : null);
let client = platformClient?.ApiClient.instance;

let notificationsApi = null;
let conversationsApi = null;
let usersApi = null;

let currentUser = null;
let pendingPopUrl = null;

/* ========================= UI ========================= */
function updateStatus(message, type = 'info') {
  const box = document.getElementById('statusBox');
  if (!box) return;

  const p = document.createElement('p');
  p.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
  p.classList.add(type);
  box.appendChild(p);
  box.scrollTop = box.scrollHeight;

  console.log(`[HOMES v${VERSION}]`, message);
}

/* ========================= PKCE ========================= */
async function generateCodeVerifier() {
  const array = new Uint8Array(32);
  crypto.getRandomValues(array);
  return btoa(String.fromCharCode(...array))
    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}

async function generateCodeChallenge(verifier) {
  const data = new TextEncoder().encode(verifier);
  const digest = await crypto.subtle.digest('SHA-256', data);
  return btoa(String.fromCharCode(...new Uint8Array(digest)))
    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}

/* ========================= CONFIG ========================= */
function getQueryParams() {
  const p = new URLSearchParams(window.location.search);
  return {
    gc_clientId: p.get('gc_clientId'),
    gc_region: p.get('gc_region'),
    gc_redirectUrl: p.get('gc_redirectUrl')
  };
}

function normalizeRegion(region) {
  if (!region) return null;
  let r = region.toLowerCase().replace(/^https?:\/\//,'').replace(/^login\./,'').replace(/^api\./,'');
  if (r.startsWith('purecloud.')) r = 'mypurecloud.' + r.split('purecloud.')[1];
  return r.includes('mypurecloud') ? r : null;
}

function getOAuthHost(region) {
  return `login.${normalizeRegion(region) || 'mypurecloud.com'}`;
}

function getApiHost(region) {
  return `api.${normalizeRegion(region) || 'mypurecloud.com'}`;
}

/* ========================= AUTH ========================= */
function guardRedirectLoop() {
  const count = parseInt(sessionStorage.getItem('authRedirects') || '0', 10);
  if (count > 3) {
    updateStatus('Auth loop detected.', 'error');
    return false;
  }
  sessionStorage.setItem('authRedirects', count + 1);
  return true;
}

async function startPKCEAuth(config) {
  if (!guardRedirectLoop()) return;

  const verifier = await generateCodeVerifier();
  const challenge = await generateCodeChallenge(verifier);

  sessionStorage.setItem('pkce_verifier', verifier);

  const state = Math.random().toString(36).substring(2);
  sessionStorage.setItem('oauth_state', state);

  const url =
    `https://${getOAuthHost(config.gc_region)}/oauth/authorize` +
    `?response_type=code` +
    `&client_id=${encodeURIComponent(config.gc_clientId)}` +
    `&redirect_uri=${encodeURIComponent(config.gc_redirectUrl)}` +
    `&code_challenge=${challenge}` +
    `&code_challenge_method=S256` +
    `&state=${state}`;

  updateStatus('Redirecting to login...', 'info');
  window.location.href = url;
}

async function exchangeCodeForToken(code, config) {
  const verifier = sessionStorage.getItem('pkce_verifier');

  const res = await fetch(`https://${getApiHost(config.gc_region)}/oauth/token`, {
    method: 'POST',
    headers: {'Content-Type':'application/x-www-form-urlencoded'},
    body: new URLSearchParams({
      grant_type: 'authorization_code',
      client_id: config.gc_clientId,
      code,
      redirect_uri: config.gc_redirectUrl,
      code_verifier: verifier
    })
  });

  if (!res.ok) throw new Error('Token exchange failed');

  return res.json();
}

async function handleAuth(config) {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const state = params.get('state');

  const expected = sessionStorage.getItem('oauth_state');
  if (state && expected && state !== expected) {
    throw new Error('State mismatch');
  }

  if (code) {
    const data = await exchangeCodeForToken(code, config);

    const expiry = Date.now() + (data.expires_in * 1000);

    localStorage.setItem('homesToken', data.access_token);
    localStorage.setItem('homesTokenExpires', expiry);
    localStorage.setItem('homesRefreshToken', data.refresh_token || '');

    window.history.replaceState({}, document.title, window.location.pathname);

    return data.access_token;
  }

  const token = localStorage.getItem('homesToken');
  const expiry = parseInt(localStorage.getItem('homesTokenExpires'), 10);

  if (token && expiry && Date.now() < expiry) {
    return token;
  }

  return null;
}

async function refreshToken(config) {
  const refresh = localStorage.getItem('homesRefreshToken');
  if (!refresh) return null;

  const res = await fetch(`https://${getApiHost(config.gc_region)}/oauth/token`, {
    method: 'POST',
    headers: {'Content-Type':'application/x-www-form-urlencoded'},
    body: new URLSearchParams({
      grant_type: 'refresh_token',
      refresh_token: refresh,
      client_id: config.gc_clientId
    })
  });

  if (!res.ok) return null;

  const data = await res.json();

  const expiry = Date.now() + (data.expires_in * 1000);
  localStorage.setItem('homesToken', data.access_token);
  localStorage.setItem('homesTokenExpires', expiry);

  return data.access_token;
}

/* ========================= API ========================= */
async function safeGetCurrentUser() {
  try {
    return await usersApi.getUsersMe();
  } catch (e) {
    updateStatus('Session expired, reauth...', 'warning');
    await startPKCEAuth(JSON.parse(localStorage.getItem('homesConfig')));
    throw e;
  }
}

/* ========================= CALL CHECK ========================= */
async function checkExistingActiveCalls(user) {
  for (let i = 0; i < 10; i++) {
    try {
      const res = await conversationsApi.getConversationsCalls();
      const calls = res.entities || [];

      for (const call of calls) {
        const agent = call.participants?.find(p => p.purpose === 'agent' && p.user?.id === user.id);
        const pop = call.participants?.map(p => p.attributes?.UD_ScreenPop_URL).find(Boolean);

        if (agent?.state === 'connected' && pop) {
          pendingPopUrl = pop;
          document.getElementById('openHomesBtn').disabled = false;
          updateStatus('Active call found.', 'success');
          return;
        }
      }
    } catch {}

    await new Promise(r => setTimeout(r, 2000));
  }

  updateStatus('No active calls.', 'info');
}

/* ========================= POPUP ========================= */
function openHOMESTab(url) {
  if (!url) {
    updateStatus('No popup URL.', 'warning');
    return;
  }

  const popup = window.open(url, '_blank', 'noopener');

  if (!popup) {
    updateStatus('Popup blocked.', 'error');
    return;
  }

  const token = localStorage.getItem('homesToken');
  const userEmail = currentUser?.email || '';

  const targetOrigin = new URL(url).origin;

  updateStatus('Waiting for popup to initialize...', 'info');

  // Listen for READY signal from popup
  function handleMessage(event) {
    if (event.origin !== targetOrigin) return;
    if (event.data !== 'HOMES_READY') return;

    updateStatus('Popup ready. Sending secure payload...', 'info');

    popup.postMessage({
      type: 'HOMES_AUTH',
      token: token,
      email: userEmail
    }, targetOrigin);

    window.removeEventListener('message', handleMessage);
  }

  window.addEventListener('message', handleMessage);
}

/* ========================= INIT ========================= */
async function init() {
  try {
    updateStatus('Initializing...', 'info');

    let config = getQueryParams();

    if (!config.gc_clientId) {
      config = JSON.parse(localStorage.getItem('homesConfig') || '{}');
    }

    if (!config.gc_clientId || !config.gc_region || !config.gc_redirectUrl) {
      updateStatus('Missing config.', 'error');
      return;
    }

    localStorage.setItem('homesConfig', JSON.stringify(config));

    let token = await handleAuth(config);

    if (!token) {
      token = await refreshToken(config);
    }

    if (!token) {
      await startPKCEAuth(config);
      return;
    }

    client.setEnvironment(getApiHost(config.gc_region));
    client.setAccessToken(token);

    notificationsApi = new platformClient.NotificationsApi();
    conversationsApi = new platformClient.ConversationsApi();
    usersApi = new platformClient.UsersApi();

    currentUser = await safeGetCurrentUser();

    updateStatus(`Logged in: ${currentUser.name}`, 'success');

    await checkExistingActiveCalls(currentUser);

    document.getElementById('openHomesBtn')
      .addEventListener('click', () => openHOMESTab(pendingPopUrl));

  } catch (err) {
    console.error(err);
    updateStatus(err.message, 'error');
  }
}

function logout() {
  localStorage.clear();
  sessionStorage.clear();
  location.reload();
}

window.onload = init;
</script>
</body>
</html>
