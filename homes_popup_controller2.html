<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HOMES Popup Controller v2.0</title>

  <script src="https://sdk-cdn.mypurecloud.com/javascript/221.0.0/purecloud-platform-client-v2.min.js"></script>
  <script src="https://sdk-cdn.mypurecloud.com/client-apps/2.6.7/purecloud-client-app-sdk.js"></script>

  <style>
    .info-container {
      background-color: #f5f5f5;
      padding: 16px;
      border-radius: 6px;
      font-family: Arial;
      font-size: 13px;
    }
    .info-container p { margin: 4px 0; }
  </style>
</head>

<body>
<div class="info-container" id="statusBox"></div>

<script>
/* =========================
   CONFIG
========================= */
const VERSION = '2.0.0';
const blockedAgentIds = [
  'a45dcb75-1121-4fb0-b956-3fb9437e539e'
];

const existingCallCheckInterval = 2500;
const existingCallMaxChecks = 20;

/* =========================
   STATE
========================= */
let config;
let crmTab = null;
let isOpeningTab = false;
let socket = null;
let user = null;

/* =========================
   UTIL
========================= */
function log(...args) {
  console.log('[HOMES v2]', ...args);
}

function updateStatus(msg) {
  const el = document.getElementById('statusBox');
  const p = document.createElement('p');
  p.textContent = msg;
  el.appendChild(p);
}

function sleep(ms) {
  return new Promise(r => setTimeout(r, ms));
}

/* =========================
   CONFIG
========================= */
function getQueryParams() {
  const p = new URLSearchParams(window.location.search);
  return {
    gc_clientId: p.get('gc_clientId'),
    gc_region: p.get('gc_region'),
    gc_redirectUrl: p.get('gc_redirectUrl'),
    gcHostOrigin: p.get('gcHostOrigin'),
    gcTargetEnv: p.get('gcTargetEnv')
  };
}

function initConfig() {
  const params = getQueryParams();

  Object.entries(params).forEach(([k, v]) => {
    if (v) sessionStorage.setItem(k, v);
  });

  const cfg = {
    gc_clientId: sessionStorage.getItem('gc_clientId'),
    gc_region: sessionStorage.getItem('gc_region'),
    gc_redirectUrl: sessionStorage.getItem('gc_redirectUrl'),
    gcHostOrigin: sessionStorage.getItem('gcHostOrigin'),
    gcTargetEnv: sessionStorage.getItem('gcTargetEnv')
  };

  if (!cfg.gc_clientId || !cfg.gc_region || !cfg.gc_redirectUrl) {
    throw new Error('Missing config');
  }

  return cfg;
}

/* =========================
   TAB MANAGEMENT
========================= */
function ensureTab() {
  if (crmTab && !crmTab.closed) return crmTab;

  if (isOpeningTab) return null;

  isOpeningTab = true;

  crmTab = window.open('about:blank', '_blank', 'noopener,noreferrer');

  if (!crmTab) {
    updateStatus('Popup blocked');
    isOpeningTab = false;
    return null;
  }

  setTimeout(() => isOpeningTab = false, 800);

  return crmTab;
}

function navigateTab(url) {
  const tab = ensureTab();
  if (!tab) return;

  log('Navigating tab →', url);
  tab.location.href = url;
}

function closeTab() {
  if (crmTab && !crmTab.closed) {
    crmTab.close();
  }
  crmTab = null;
}

/* =========================
   CALL LOGIC
========================= */
function isFirstAgent(participants, userId) {
  const agents = participants
    .filter(p => p.purpose === 'agent' && p.state === 'connected')
    .sort((a, b) => new Date(a.connectedTime) - new Date(b.connectedTime));

  return agents.length > 0 && agents[0].user?.id === userId;
}

function getPopUrl(participants) {
  return participants.find(p => p.attributes?.UD_ScreenPop_URL)
    ?.attributes?.UD_ScreenPop_URL;
}

function handleCallEvent(participants) {
  if (!participants) return;

  const agent = participants.find(p =>
    p.purpose === 'agent' && p.user?.id === user.id
  );

  if (!agent) return;

  const popUrl = getPopUrl(participants);

  /* CONNECTED */
  if (agent.state === 'connected' && popUrl && isFirstAgent(participants, user.id)) {
    const url = new URL(popUrl);
    url.searchParams.set('p2', user.email);

    updateStatus(`Opening: ${url}`);
    navigateTab(url.toString());
  }

  /* DISCONNECTED */
  if (['disconnected', 'terminated'].includes(agent.state)) {
    if (agent.wrapup) {
      updateStatus('Closing tab after wrap-up');
      closeTab();
    }
  }
}

/* =========================
   EXISTING CALL CHECK
========================= */
async function checkExistingCalls(api) {
  updateStatus('Checking existing calls...');

  for (let i = 0; i < existingCallMaxChecks; i++) {
    try {
      const res = await api.getConversationsCalls();

      if (!res?.entities?.length) {
        await sleep(existingCallCheckInterval);
        continue;
      }

      res.entities.forEach(call => handleCallEvent(call.participants));
      return;

    } catch (err) {
      log('Error checking calls', err);
      return;
    }
  }

  updateStatus('No existing calls found');
}

/* =========================
   WEBSOCKET
========================= */
function connectWebSocket(uri) {
  socket = new WebSocket(uri);

  socket.onopen = () => updateStatus('WebSocket connected');

  socket.onmessage = (event) => {
    try {
      const data = JSON.parse(event.data);
      if (!data.eventBody) return;

      handleCallEvent(data.eventBody.participants);
    } catch (err) {
      log('WS error', err);
    }
  };

  socket.onclose = () => {
    updateStatus('WebSocket reconnecting...');
    setTimeout(() => connectWebSocket(uri), 3000);
  };

  socket.onerror = err => log('WS error', err);
}

/* =========================
   INIT
========================= */
async function init() {
  const platformClient = require('platformClient');
  const client = platformClient.ApiClient.instance;

  const notificationsApi = new platformClient.NotificationsApi();
  const usersApi = new platformClient.UsersApi();
  const conversationsApi = new platformClient.ConversationsApi();

  client.setEnvironment(config.gc_region);
  client.setPersistSettings(true, 'homesPopup');

  await client.loginImplicitGrant(config.gc_clientId, config.gc_redirectUrl);

  user = await usersApi.getUsersMe();

  updateStatus(`Logged in: ${user.name}`);

  if (blockedAgentIds.includes(user.id)) {
    updateStatus('User blocked');
    return;
  }

  const channel = await notificationsApi.postNotificationsChannels();

  await notificationsApi.putNotificationsChannelSubscriptions(channel.id, [{
    id: `v2.users.${user.id}.conversations.calls`
  }]);

  connectWebSocket(channel.connectUri);

  await checkExistingCalls(conversationsApi);
}

/* =========================
   BOOTSTRAP
========================= */
(function bootstrap() {
  updateStatus(`HOMES Controller v${VERSION}`);

  config = initConfig();

  const ClientApp = window.purecloud.apps.ClientApp;

  const app = new ClientApp({
    gcHostOrigin: config.gcHostOrigin,
    gcTargetEnv: config.gcTargetEnv
  });

  app.lifecycle.addBootstrapListener(() => {
    updateStatus('Bootstrapped');

    // Pre-open tab
    crmTab = window.open('about:blank', '_blank');

    init();

    app.lifecycle.bootstrapped();
  });

  app.lifecycle.addStopListener(() => {
    updateStatus('Stopped');

    closeTab();

    if (socket && socket.readyState === WebSocket.OPEN) {
      socket.close();
    }

    app.lifecycle.stopped();
  });

})();
</script>
</body>
</html>
