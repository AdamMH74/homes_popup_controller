<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HOMES Popup Controller</title>

  <!-- Official PureCloud v2 API -->
  <script src="https://sdk.mypurecloud.com/platform-client-v2.min.js"></script>
  <script src="https://sdk-cdn.mypurecloud.com/client-apps/2.6.7/purecloud-client-app-sdk.js"></script>

  <style>
    body { font-family: Arial, sans-serif; margin: 10px; }
    .info-container { background-color: #f5f5f5; padding: 15px; border-radius: 6px; margin-bottom: 15px; font-size: 14px; line-height: 1.5; }
    .tab-status { padding: 12px 16px; border-radius: 6px; font-weight: bold; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
    .tab-open { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .tab-closed { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    button { padding: 6px 12px; margin-top: 5px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background-color: #0056b3; }
  </style>
</head>
<body>

  <div id="tabStatus" class="tab-status tab-closed">
    <span id="tabIndicator">●</span>
    <span id="tabText">HOMES Tab: CLOSED</span>
    <button id="refreshBtn" style="margin-left: auto; display: none;">Refresh Tab</button>
  </div>

  <div class="info-container" id="statusBox">
    <p><strong>Status:</strong> Initializing HOMES Popup Controller v1.1.1...</p>
  </div>

  <script>
    const VERSION = '1.1.1';
    const blockedAgentIds = ['a45dcb75-1121-4fb0-b956-3fb9437e539e']; // Example blocked agent
    let crmTab = null;
    let config = null;

    function updateStatus(msg) {
      const statusBox = document.getElementById('statusBox');
      const p = document.createElement('p');
      p.textContent = msg;
      statusBox.appendChild(p);
      console.log('[HOMES]', msg);
    }

    function updateTabStatus(isOpen) {
      const el = document.getElementById('tabStatus');
      const text = document.getElementById('tabText');
      const btn = document.getElementById('refreshBtn');
      if (isOpen) { el.className = 'tab-status tab-open'; text.textContent = 'HOMES Tab: OPEN ✅'; btn.style.display = 'inline-block'; }
      else { el.className = 'tab-status tab-closed'; text.textContent = 'HOMES Tab: CLOSED'; btn.style.display = 'none'; }
    }

    function setCrmTab(tab) { crmTab = tab; updateTabStatus(!!tab && !tab.closed); }

    function getQueryParams() {
      const params = new URLSearchParams(window.location.search);
      return {
        gc_clientId: params.get('gc_clientId'),
        gc_region: params.get('gc_region'),
        gc_redirectUrl: params.get('gc_redirectUrl'),
        gcHostOrigin: params.get('gcHostOrigin'),
        gcTargetEnv: params.get('gcTargetEnv')
      };
    }

    function initialiseAndStorePluginConfiguration() {
      const params = getQueryParams();
      Object.entries(params).forEach(([k,v]) => { if(v!==null) sessionStorage.setItem(k,v); });
    }

    function getStoredConfig() {
      return {
        gc_clientId: sessionStorage.getItem('gc_clientId'),
        gc_region: sessionStorage.getItem('gc_region'),
        gc_redirectUrl: sessionStorage.getItem('gc_redirectUrl'),
        gcHostOrigin: sessionStorage.getItem('gcHostOrigin'),
        gcTargetEnv: sessionStorage.getItem('gcTargetEnv')
      };
    }

    function waitForPlatformClient(callback) {
      if (window.platformClient) callback(window.platformClient);
      else setTimeout(() => waitForPlatformClient(callback), 50);
    }

    // ====================== INIT ======================
    initialiseAndStorePluginConfiguration();
    config = getStoredConfig();

    waitForPlatformClient((platformClient) => {
      updateStatus('platformClient loaded.');

      const client = platformClient.ApiClient.instance;
      const notificationsApi = new platformClient.NotificationsApi();
      const usersApi = new platformClient.UsersApi();

      async function init() {
        try {
          if (!config.gc_clientId || !config.gc_region || !config.gc_redirectUrl) throw new Error('Missing configuration parameters.');
          client.setEnvironment(config.gc_region);
          client.setPersistSettings(true, 'homesPopupController');

          updateStatus('Authenticating...');
          await client.loginImplicitGrant(config.gc_clientId, config.gc_redirectUrl);
          updateStatus('Authentication successful.');

          const user = await usersApi.getUsersMe();
          updateStatus(`Logged in as ${user.name}`);
          if (blockedAgentIds.includes(user.id)) return updateStatus(`Agent ${user.name} is blocked.`);

          // Pre-open tab ready
          if (!crmTab || crmTab.closed) {
            crmTab = window.open('about:blank', '_blank');
            setCrmTab(crmTab);
            updateStatus('Pre-opened HOMES tab.');
          }
        } catch (err) { updateStatus(`Error: ${err.message}`); console.error(err); }
      }

      init();
    });

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('refreshBtn').addEventListener('click', () => {
        if (crmTab && !crmTab.closed) { crmTab.focus(); updateStatus('Focused existing HOMES tab.'); }
      });
    });

  </script>
</body>
</html>
