<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HOMES Client & Popup Controller</title>
  <script src="https://sdk-cdn.mypurecloud.com/javascript/221.0.0/purecloud-platform-client-v2.min.js"></script>
  <script src="https://sdk-cdn.mypurecloud.com/client-apps/2.6.7/purecloud-client-app-sdk.js"></script>

  <style>
    body { 
      font-family: 'Segoe UI', Arial, sans-serif; 
      margin: 0; 
      padding: 20px; 
      background: #f8f9fa; 
      color: #333; 
    }
    h1 { color: #0052cc; margin-bottom: 8px; }
    .subtitle { color: #666; margin-bottom: 20px; font-size: 15px; }
    #statusBox { 
      background: #fff; 
      border: 1px solid #ddd; 
      border-radius: 8px; 
      padding: 20px; 
      max-width: 920px; 
      max-height: 75vh; 
      overflow-y: auto; 
      box-shadow: 0 2px 12px rgba(0,0,0,0.1); 
      line-height: 1.55; 
      font-size: 14px;
    }
    #statusBox p { 
      margin: 8px 0; 
      padding: 6px 10px; 
      border-radius: 4px; 
    }
    .error   { background: #ffebee; color: #c62828; border-left: 5px solid #c62828; }
    .success { background: #e8f5e9; color: #2e7d32; border-left: 5px solid #2e7d32; }
    .info    { background: #e3f2fd; color: #1565c0; border-left: 5px solid #1565c0; }
    .warning { background: #fff3e0; color: #ef6c00; border-left: 5px solid #ef6c00; }

    button { 
      margin-top: 15px; 
      padding: 10px 24px; 
      background-color: #0052cc; 
      color: white; 
      border: none; 
      border-radius: 6px; 
      cursor: pointer; 
      font-size: 14px;
    }
    button:hover { background-color: #003d99; }
    button:disabled { background-color: #888; cursor: not-allowed; }
    .version { font-size: 12px; color: #888; margin-top: 12px; }
  </style>
</head>
<body>
  <h1>HOMES Client & Popup Controller</h1>
  <p class="subtitle">Genesys Cloud Integration • Version <span id="appVersion">1.3.1</span></p>

  <div id="statusBox">
    <p class="info">Initializing HOMES Client & Popup Controller...</p>
  </div>

  <button id="openHomesBtn" disabled>Open HOMES CRM</button>
  <button onclick="logout()">Logout & Clear Token</button>

  <div class="version">
    SDK: purecloud-platform-client-v2 • Implicit Grant (Consider migrating to PKCE)
  </div>

<script>
const VERSION = '1.3.1';
const BLOCKED_AGENT_IDS = ['a45dcb75-1121-4fb0-b956-3fb9437e539e'];

let crmTab = null;
let platformClient = window.platformClient || (window.require ? window.require('platformClient') : null);
let client = platformClient?.ApiClient.instance;

let notificationsApi = null;
let conversationsApi = null;
let usersApi = null;

let currentUser = null;
let notificationSocket = null;

let pendingPopUrl = null; // Store pop URL until user clicks button

function updateStatus(message, type = 'info') {
  const statusBox = document.getElementById('statusBox');
  if (!statusBox) return;

  const p = document.createElement('p');
  p.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
  p.classList.add(type);
  statusBox.appendChild(p);
  statusBox.scrollTop = statusBox.scrollHeight;

  console.log(`[HOMES v${VERSION}] [${type.toUpperCase()}]`, message);
}

// ====================== Configuration & Token ======================

function getQueryParams() {
  const params = new URLSearchParams(window.location.search);
  return {
    gc_clientId: params.get('gc_clientId'),
    gc_region: params.get('gc_region'),
    gc_redirectUrl: params.get('gc_redirectUrl')
  };
}

function normalizeRegion(region) {
  if (!region) return null;
  let r = region.toLowerCase().trim()
    .replace(/^https?:\/\//, '')
    .replace(/^login\./, '')
    .replace(/^api\./, '');
  if (r.startsWith('purecloud.')) {
    r = 'mypurecloud.' + r.split('purecloud.')[1];
  }
  return r.includes('mypurecloud') ? r : null;
}

function getOAuthHost(region) {
  const n = normalizeRegion(region);
  return n ? `login.${n}` : 'login.mypurecloud.com';
}

function getApiHost(region) {
  const n = normalizeRegion(region);
  return n ? `api.${n}` : 'api.mypurecloud.com';
}

function parseHashToken() {
  const hash = window.location.hash.substring(1);
  const params = new URLSearchParams(hash);

  let token = params.get('access_token');
  let expiresIn = params.get('expires_in');
  let tokenType = params.get('token_type');

  if (token) {
    token = decodeURIComponent(token);
    const expiry = Date.now() + parseInt(expiresIn || 3600, 10) * 1000;

    localStorage.setItem('homesToken', token);
    localStorage.setItem('homesTokenExpires', expiry);
    localStorage.setItem('homesTokenType', tokenType || 'bearer');
  } else {
    token = localStorage.getItem('homesToken');
    const storedExpiry = parseInt(localStorage.getItem('homesTokenExpires'), 10);

    if (token && storedExpiry && storedExpiry > Date.now()) {
      expiresIn = Math.floor((storedExpiry - Date.now()) / 1000);
    } else {
      token = null;
    }
  }

  return { token, expiresIn: parseInt(expiresIn || 0, 10) };
}

// ====================== HOMES Tab Opening ======================

function openHOMESTab(popUrl) {
    if (!popUrl) return;

    // FIX 404: Correct case for GitHub Pages file
    popUrl = 'https://adammh74.github.io/homes_popup_controller/home_crm.html';

    const url = new URL(popUrl);
    const userEmail = currentUser?.email;
    const token = localStorage.getItem('homesToken');

    url.searchParams.set('p2', userEmail || '');
    if (token) url.searchParams.set('token', token);

    crmTab = window.open(url.toString(), '_blank');
    updateStatus('HOMES CRM tab opened by user.', 'success');

    const handleReady = (event) => {
        if (event.source === crmTab && event.data?.type === 'homesReady') {
            crmTab.postMessage({
                type: 'homesConfig',
                config: JSON.parse(localStorage.getItem('homesConfig') || '{}'),
                token: localStorage.getItem('homesToken')
            }, new URL(popUrl).origin);

            updateStatus('HOMES config sent to CRM tab.', 'success');
            window.removeEventListener('message', handleReady);
        }
    };

    window.addEventListener('message', handleReady);
}

// ====================== Notification Handler (Fixed Single Pop per Call) ======================
const activePopCalls = new Set(); // Track calls that already triggered screen pop

notificationSocket.onmessage = (evt) => {
    try {
        const data = JSON.parse(evt.data);
        const interaction = data.eventBody;
        if (!interaction?.participants) return;

        const participants = interaction.participants;
        const agent = participants.find(p => p.purpose === 'agent' && p.user?.id === currentUser.id);
        const popUrl = participants.map(p => p.attributes?.UD_ScreenPop_URL).find(Boolean);

        if (!agent || !popUrl) return;

        const callId = interaction.id || popUrl; // unique identifier for this call

        // Only show "Call ready" message once per call
        if (!activePopCalls.has(callId) && agent.state === 'connected') {
            updateStatus('Call ready for screen pop. Click button to open HOMES CRM.', 'info');
            activePopCalls.add(callId);
        }

        // Open the tab only if it hasn’t been opened yet for this call
        if (agent.state === 'connected' && (!crmTab || crmTab.closed)) {
            openHOMESTab(popUrl);
        }

        // Close tab if call ended
        if ((agent.state === 'disconnected' || agent.state === 'terminated') && crmTab && !crmTab.closed) {
            crmTab.close();
            crmTab = null;
            updateStatus('Closed HOMES tab after call ended.', 'info');

            // Remove call from active set so future calls can trigger
            activePopCalls.delete(callId);
        }

    } catch (err) {
        console.error('Error processing notification:', err);
    }
};

    await checkExistingActiveCalls(currentUser);

    updateStatus('HOMES Client initialized successfully.', 'success');

  } catch (err) {
    console.error(err);
    updateStatus(`Initialization failed: ${err.message}`, 'error');
  }
}

function logout() {
  if (!confirm('Clear all tokens and logout?')) return;

  if (client) client.logout?.();

  localStorage.removeItem('homesToken');
  localStorage.removeItem('homesTokenExpires');
  localStorage.removeItem('homesTokenType');
  localStorage.removeItem('homesConfig');

  if (crmTab && !crmTab.closed) crmTab.close();
  if (notificationSocket) notificationSocket.close();

  window.location.hash = '';
  window.location.reload();
}

window.addEventListener('beforeunload', () => {
  if (crmTab && !crmTab.closed) crmTab.close();
  if (notificationSocket && notificationSocket.readyState === WebSocket.OPEN) {
    notificationSocket.close();
  }
});

window.onload = init;
</script>
</body>
</html>
