<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HOMES Workspace Controller</title>

  <script src="https://sdk-cdn.mypurecloud.com/javascript/221.0.0/purecloud-platform-client-v2.min.js"></script>
  <script src="https://sdk-cdn.mypurecloud.com/client-apps/2.6.7/purecloud-client-app-sdk.js"></script>

  <style>
    body { font-family: Arial; margin: 10px; }

    .info-container {
      background: #f5f5f5;
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 10px;
      font-size: 14px;
    }

    .layout {
      display: flex;
      gap: 10px;
      height: 600px;
    }

    #callPanel {
      width: 30%;
      background: #f8f9fa;
      padding: 10px;
      border-radius: 6px;
    }

    #crmContainer {
      width: 70%;
      border: 1px solid #ccc;
      border-radius: 6px;
      overflow: hidden;
      display: none;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    button {
      margin-top: 5px;
      padding: 5px 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="info-container" id="statusBox">
  <strong>Status:</strong> Initializing...
</div>

<div class="layout">

  <!-- CALL PANEL -->
  <div id="callPanel">
    <h3>Active Call</h3>
    <div id="callDetails">
      <p>No active call</p>
    </div>

    <button onclick="refreshCRM()">Refresh CRM</button>
  </div>

  <!-- CRM -->
  <div id="crmContainer">
    <iframe id="crmFrame"></iframe>
  </div>

</div>

<script>
const platformClient = window.platformClient;
const client = platformClient.ApiClient.instance;
const notificationsApi = new platformClient.NotificationsApi();
const conversationsApi = new platformClient.ConversationsApi();
const usersApi = new platformClient.UsersApi();

let crmFrame, crmContainer;
let activeInteractionId = null;

// ---------------- UI ----------------

function updateStatus(msg) {
  const box = document.getElementById('statusBox');
  const p = document.createElement('p');
  p.textContent = msg;
  box.appendChild(p);
  console.log(msg);
}

function renderCallInfo(interaction, user) {
  const container = document.getElementById('callDetails');
  const participants = interaction.participants || [];

  const customer = participants.find(p => p.purpose === 'customer');
  const agent = participants.find(p => p.purpose === 'agent' && p.user?.id === user.id);

  container.innerHTML = `
    <p><b>ID:</b> ${interaction.id}</p>
    <p><b>Caller:</b> ${customer?.address || 'Unknown'}</p>
    <p><b>Status:</b> ${agent?.state}</p>
  `;
}

// ---------------- CRM ----------------

function openCrm(url, interaction, user) {
  const customer = interaction.participants.find(p => p.purpose === 'customer');

  const u = new URL(url);
  u.searchParams.set('agentEmail', user.email);
  u.searchParams.set('interactionId', interaction.id);
  u.searchParams.set('caller', customer?.address || '');

  crmFrame.src = u.toString();
  crmContainer.style.display = 'block';

  updateStatus('CRM loaded');
}

function closeCrm() {
  crmFrame.src = 'about:blank';
  crmContainer.style.display = 'none';
  activeInteractionId = null;
  updateStatus('CRM cleared');
}

function refreshCRM() {
  if (crmFrame.src) crmFrame.src = crmFrame.src;
}

// ---------------- LOGIC ----------------

function isFirstAgent(participants, userId) {
  const agents = participants
    .filter(p => p.purpose === 'agent' && p.state === 'connected')
    .sort((a, b) => new Date(a.connectedTime) - new Date(b.connectedTime));

  return agents.length && agents[0].user?.id === userId;
}

// ---------------- INIT ----------------

async function init() {
  try {
    const params = new URLSearchParams(window.location.search);

    client.setEnvironment(params.get('gc_region'));
    await client.loginImplicitGrant(
      params.get('gc_clientId'),
      params.get('gc_redirectUrl')
    );

    const user = await usersApi.getUsersMe();
    updateStatus('Logged in: ' + user.name);

    const channel = await notificationsApi.postNotificationsChannels();

    await notificationsApi.putNotificationsChannelSubscriptions(channel.id, [{
      id: `v2.users.${user.id}.conversations.calls`
    }]);

    const socket = new WebSocket(channel.connectUri);

    socket.onmessage = (event) => {
      const data = JSON.parse(event.data);
      const interaction = data.eventBody;
      if (!interaction) return;

      const participants = interaction.participants || [];
      const agent = participants.find(p => p.purpose === 'agent' && p.user?.id === user.id);
      if (!agent) return;

      const popUrl = participants.map(p => p.attributes?.UD_ScreenPop_URL).find(Boolean);

      // CALL CONNECT
      if (agent.state === 'connected' && popUrl && isFirstAgent(participants, user.id)) {

        renderCallInfo(interaction, user);

        if (interaction.id !== activeInteractionId) {
          activeInteractionId = interaction.id;
          openCrm(popUrl, interaction, user);
        }
      }

      // CALL END
      if ((agent.state === 'disconnected' || agent.state === 'terminated') &&
          agent.wrapup?.state === 'done') {

        closeCrm();
        document.getElementById('callDetails').innerHTML = '<p>No active call</p>';
      }
    };

  } catch (err) {
    updateStatus('Error: ' + err.message);
    console.error(err);
  }
}

// ---------------- START ----------------

document.addEventListener('DOMContentLoaded', () => {
  crmFrame = document.getElementById('crmFrame');
  crmContainer = document.getElementById('crmContainer');
  init();
});
</script>

</body>
</html>
