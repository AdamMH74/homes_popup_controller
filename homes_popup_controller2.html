<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HOMES Popup Controller</title>

  <!-- Load Platform SDK directly -->
  <script src="https://sdk-cdn.mypurecloud.com/javascript/purecloud-platform-client-v2.min.js"></script>

  <style>
    .info-container {
      background-color: #f5f5f5;
      padding: 20px;
      border-radius: 5px;
      margin-bottom: 20px;
      font-family: Arial, sans-serif;
      font-size: 14px;
    }
    .info-container p { margin: 5px 0; }
  </style>
</head>
<body>
  <div class="info-container" id="statusBox">
    <p><strong>Status:</strong> Initializing HOMES Popup Controller...</p>
  </div>

  <script>
    let crmTab = null;
    let socket = null;

    function updateStatus(msg) {
      const box = document.getElementById('statusBox');
      const p = document.createElement('p');
      p.textContent = msg;
      box.appendChild(p);
      console.log('[HOMES]', msg);
    }

    function getQueryParams() {
      const params = new URLSearchParams(window.location.search);
      return {
        gc_clientId: params.get('gc_clientId'),
        gc_region: params.get('gc_region'),
        gc_redirectUrl: params.get('gc_redirectUrl'),
        gc_conversationId: params.get('gc_conversationId'),
      };
    }

    async function start() {
      const config = getQueryParams();

      if (!config.gc_clientId || !config.gc_region || !config.gc_redirectUrl) {
        updateStatus('Missing gc_clientId, gc_region, or gc_redirectUrl in URL');
        return;
      }

      const platformClient = window.purecloudPlatformClientV2;

      // Configure environment
      platformClient.ApiClient.instance.setEnvironment(config.gc_region);
      platformClient.ApiClient.instance.setPersistSettings(true, 'homesPopupController');

      try {
        // Login
        updateStatus('Authenticating...');
        await platformClient.ApiClient.instance.loginImplicitGrant(
          config.gc_clientId,
          config.gc_redirectUrl
        );
        updateStatus('Authentication successful');

        // Get user info
        const user = await new platformClient.UsersApi().getUsersMe();
        updateStatus(`Logged in as: ${user.name}`);

        // Open blank tab
        crmTab = window.open('about:blank', 'HOMES_CRM_TAB');

        // Check active calls
        await checkActiveCalls(user, platformClient);

        // Subscribe to notifications
        const notificationsApi = new platformClient.NotificationsApi();
        const channel = await notificationsApi.postNotificationsChannels();
        const topic = `v2.users.${user.id}.conversations.calls`;
        await notificationsApi.putNotificationsChannelSubscriptions(channel.id, [{ id: topic }]);

        socket = new WebSocket(channel.connectUri);
        socket.onopen = () => updateStatus('WebSocket connected');
        socket.onmessage = (evt) => handleMessage(evt, user);
        socket.onclose = () => updateStatus('WebSocket closed');
        socket.onerror = () => updateStatus('WebSocket error');

      } catch (err) {
        updateStatus(`Error: ${err.message}`);
        console.error(err);
      }
    }

    async function checkActiveCalls(user, platformClient) {
      const convApi = new platformClient.ConversationsApi();
      const activeCalls = await convApi.getConversationsCalls();
      if (!activeCalls?.entities?.length) return;

      for (const call of activeCalls.entities) {
        const participants = call.participants || [];
        const agent = participants.find(p => p.purpose === 'agent' && p.user?.id === user.id);
        if (!agent || agent.state !== 'connected') continue;

        const popUrl = participants.map(p => p.attributes?.UD_ScreenPop_URL).find(u => u);
        if (!popUrl) continue;

        const url = new URL(popUrl);
        url.searchParams.set('p2', user.email);

        if (crmTab && !crmTab.closed) crmTab.location.href = url.toString();
        else crmTab = window.open(url.toString(), 'HOMES_CRM_TAB');

        updateStatus(`Opened HOMES tab for active call: ${url}`);
      }
    }

    function handleMessage(event, user) {
      try {
        const data = JSON.parse(event.data);
        if (!data.eventBody) return;

        const participants = data.eventBody.participants || [];
        const agent = participants.find(p => p.purpose === 'agent' && p.user?.id === user.id);
        if (!agent) return;

        const popUrl = participants.map(p => p.attributes?.UD_ScreenPop_URL).find(u => u);

        if (agent.state === 'connected' && popUrl) {
          const url = new URL(popUrl);
          url.searchParams.set('p2', user.email);
          if (crmTab && !crmTab.closed) crmTab.location.href = url.toString();
          else crmTab = window.open(url.toString(), 'HOMES_CRM_TAB');
          updateStatus(`Opened HOMES tab: ${url}`);
        }

        if ((agent.state === 'disconnected' || agent.state === 'terminated') && crmTab && !crmTab.closed) {
          crmTab.close();
          crmTab = null;
          updateStatus('Closed HOMES tab after wrap-up');
        }
      } catch (err) {
        updateStatus(`WebSocket parse error: ${err.message}`);
      }
    }

    document.addEventListener('DOMContentLoaded', start);
  </script>
</body>
</html>
