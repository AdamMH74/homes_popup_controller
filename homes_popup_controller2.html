<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HOMES Popup Controller - Safe OAuth</title>
<script src="https://sdk-cdn.mypurecloud.com/javascript/221.0.0/purecloud-platform-client-v2.min.js"></script>
<script src="https://sdk-cdn.mypurecloud.com/client-apps/2.6.7/purecloud-client-app-sdk.js"></script>
<style>
  .info-container { background-color: #f5f5f5; padding: 20px; border-radius: 5px; font-family: Arial; font-size: 14px; }
  .info-container p { margin: 5px 0; }
  #openCrmBtn { display: none; margin-top: 10px; padding: 8px 15px; cursor: pointer; }
</style>
</head>
<body>

<div class="info-container" id="statusBox">
  <p><strong>Status:</strong> Initializing HOMES Popup Controller...</p>
  <button id="openCrmBtn">Open HOMES CRM</button>
</div>

<script>
const blockedAgentIds = ['a45dcb75-1121-4fb0-b956-3fb9437e539e'];
const platformClient = require('platformClient');
const client = platformClient.ApiClient.instance;
const notificationsApi = new platformClient.NotificationsApi();
const conversationsApi = new platformClient.ConversationsApi();
const usersApi = new platformClient.UsersApi();

let pendingOAuthUrl = null;

// Helper to update UI
function updateStatus(msg) {
  const statusBox = document.getElementById('statusBox');
  const p = document.createElement('p');
  p.textContent = msg;
  statusBox.appendChild(p);
  console.log('[HOMES]', msg);
}

// Build Microsoft OAuth URL
function buildMicrosoftOAuthUrl() {
  return new URL(`https://login.microsoftonline.com/YOUR_TENANT_ID/oauth2/v2.0/authorize?` +
    new URLSearchParams({
      client_id: 'YOUR_CLIENT_ID',
      response_type: 'token',
      redirect_uri: 'https://yourdomain.com/homes-redirect.html',
      scope: 'openid profile User.Read',
      state: Math.random().toString(36).substring(2),
      prompt: 'login'
    }).toString()
  ).toString();
}

// Show button for user click
function showCrmButton() {
  const btn = document.getElementById('openCrmBtn');
  pendingOAuthUrl = buildMicrosoftOAuthUrl();
  btn.style.display = 'inline-block';

  // User click is required for top-level popup
  btn.onclick = () => {
    window.open(pendingOAuthUrl, '_blank', 'noopener,noreferrer');
    updateStatus('Opened Microsoft login in a new tab.');
  };
}

// Initialize Genesys Cloud
async function init() {
  try {
    client.setEnvironment(sessionStorage.getItem('gc_region'));
    client.setPersistSettings(true, 'homesPopupController');
    await client.loginImplicitGrant(sessionStorage.getItem('gc_clientId'), sessionStorage.getItem('gc_redirectUrl'));

    const user = await usersApi.getUsersMe();
    updateStatus(`Logged in as: ${user.name}`);
    if (blockedAgentIds.includes(user.id)) return updateStatus('Agent blocked from widget.');

    const channel = await notificationsApi.postNotificationsChannels();
    await notificationsApi.putNotificationsChannelSubscriptions(channel.id, [{ id: `v2.users.${user.id}.conversations.calls` }]);
    const socket = new WebSocket(channel.connectUri);

    socket.onmessage = async (event) => {
      const data = JSON.parse(event.data);
      const participants = data?.eventBody?.participants || [];
      const agent = participants.find(p => p.purpose === 'agent' && p.user?.id === user.id);
      const screenPopUrl = participants.map(p => p.attributes?.UD_ScreenPop_URL).find(url => url);

      if (agent?.state === 'connected' && screenPopUrl) {
        updateStatus('Incoming call with screen pop. Click button to login and open HOMES CRM.');
        showCrmButton();
      }
    };

  } catch (err) {
    updateStatus(`Initialization error: ${err.message}`);
    console.error(err);
  }
}

init();
</script>
</body>
</html>
