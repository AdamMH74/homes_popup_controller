<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HOMES Minimal SDK Test</title>

  <!-- Load Platform SDK -->
    <script src="purecloud-platform-client-v2.min.js"></script>
  <script src="https://sdk-cdn.mypurecloud.com/client-apps/2.6.7/purecloud-client-app-sdk.js"></script>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    .info-container { background: #f5f5f5; padding: 20px; border-radius: 5px; }
    .info-container p { margin: 5px 0; }
  </style>
</head>
<body>
  <div class="info-container" id="statusBox">
    <p><strong>Status:</strong> Initializing...</p>
  </div>

  <script>
    const statusBox = document.getElementById('statusBox');

    function updateStatus(msg) {
      const p = document.createElement('p');
      p.textContent = msg;
      statusBox.appendChild(p);
      console.log('[Minimal SDK]', msg);
    }

    async function startSDK() {
      try {
        updateStatus('Loading Platform SDK...');
        const platformClient = window.purecloudPlatformClientV2;

        if (!platformClient || !platformClient.ApiClient) {
          updateStatus('Platform SDK not available!');
          return;
        }

        // Example: set environment (replace with your region if needed)
        platformClient.ApiClient.instance.setEnvironment('mypurecloud.com.au');
        platformClient.ApiClient.instance.setPersistSettings(true, 'minimalSdkTest');

        updateStatus('Platform SDK loaded successfully.');
        updateStatus('SDK client process completed ✅');

      } catch (err) {
        updateStatus(`Error initializing SDK: ${err.message}`);
        console.error(err);
      }
    }

    document.addEventListener('DOMContentLoaded', startSDK);
  </script>
</body>
</html>
