<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SDK Test</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    .box { background:#f5f5f5; padding:15px; border-radius:5px; }
  </style>
</head>
<body>

<div class="box" id="statusBox">
  <p><strong>Status:</strong> Initializing...</p>
</div>

<!-- LOAD SDK FIRST -->
<script src="purecloud-platform-client-v2.min.js"></script>

<script>
  const box = document.getElementById('statusBox');

  function log(msg) {
    const p = document.createElement('p');
    p.textContent = msg;
    box.appendChild(p);
    console.log(msg);
  }

  function start() {
    log('Checking SDK...');

    console.log('window object check:', window);

    const sdk = window.purecloudPlatformClientV2;

    if (!sdk) {
      log('❌ SDK NOT LOADED');
      return;
    }

    if (!sdk.ApiClient) {
      log('❌ ApiClient missing');
      return;
    }

    log('✅ SDK Loaded');
    
    sdk.ApiClient.instance.setEnvironment('mypurecloud.com.au');
    sdk.ApiClient.instance.setPersistSettings(true, 'test');

    log('✅ SDK client process completed');
  }

  start();
</script>

</body>
</html>
