<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HOMES SDK Inline Test</title>

  <style>
    body { font-family: Arial; padding: 20px; }
    .box { background:#f5f5f5; padding:15px; border-radius:5px; }
  </style>
</head>
<body>

<div class="box" id="statusBox">
  <p><strong>Status:</strong> Initializing...</p>
</div>

<script>
  const box = document.getElementById('statusBox');

  function log(msg) {
    const p = document.createElement('p');
    p.textContent = msg;
    box.appendChild(p);
    console.log(msg);
  }

  async function loadSDKInline() {
    try {
      log('Fetching SDK...');

      const response = await fetch(
        'https://sdk-cdn.mypurecloud.com/javascript/221.0.0/purecloud-platform-client-v2.min.js'
      );

      const sdkText = await response.text();

      log('Injecting SDK...');

      const script = document.createElement('script');
      script.textContent = sdkText;
      document.body.appendChild(script);

      log('SDK injected');

    } catch (err) {
      log('❌ Failed to load SDK: ' + err.message);
      throw err;
    }
  }

  async function start() {
    try {
      await loadSDKInline();

      log('Checking SDK...');

      const sdk = window.purecloudPlatformClientV2;

      if (!sdk) {
        log('❌ SDK NOT LOADED');
        return;
      }

      if (!sdk.ApiClient) {
        log('❌ ApiClient missing');
        return;
      }

      log('✅ SDK Loaded');

      sdk.ApiClient.instance.setEnvironment('mypurecloud.com.au');
      sdk.ApiClient.instance.setPersistSettings(true, 'inlineTest');

      log('✅ SDK client process completed');

    } catch (err) {
      log('Error: ' + err.message);
    }
  }

  start();
</script>

</body>
</html>
