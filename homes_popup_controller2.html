<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HOMES Client App</title>
  <script src="purecloud-platform-client-v2.min.js"></script>
  <script src="https://sdk-cdn.mypurecloud.com/client-apps/2.6.7/purecloud-client-app-sdk.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    #statusBox {
      background: #f5f5f5;
      padding: 15px;
      border-radius: 5px;
      max-width: 800px;
      max-height: 600px;
      overflow-y: auto;
    }
    #statusBox p { margin: 5px 0; }
    .error { color: red; }
    .success { color: green; }
  </style>
</head>
<body>
  <h2>HOMES Client App Status</h2>
  <div id="statusBox">
    <p>Initializing...</p>
  </div>

  <script>
    const VERSION = '1.0.1'; // bumped version

    function updateStatus(message, isError = false) {
      const statusBox = document.getElementById('statusBox');
      if (!statusBox) return;
      
      const p = document.createElement('p');
      p.textContent = message;
      if (isError) p.classList.add('error');
      statusBox.appendChild(p);
      statusBox.scrollTop = statusBox.scrollHeight;
      console.log('[HOMES Client]', message);
    }

    // Get query parameters from Genesys Cloud
    function getQueryParams() {
      const params = new URLSearchParams(window.location.search);
      return {
        gc_clientId: params.get('gc_clientId'),
        gc_region: params.get('gc_region'),
        gc_redirectUrl: params.get('gc_redirectUrl'),
        gcHostOrigin: params.get('gcHostOrigin'),
        gcTargetEnv: params.get('gcTargetEnv')
      };
    }

    const config = getQueryParams();
    updateStatus(`Loaded configuration: ${JSON.stringify(config, null, 2)}`);

    // === Platform Client Setup (Browser-friendly) ===
    const platformClient = window.platformClient; // global from the min.js script
    if (!platformClient) {
      updateStatus('ERROR: platformClient SDK not loaded!', true);
      throw new Error('platformClient not found');
    }

    const client = platformClient.ApiClient.instance;
    client.setEnvironment(config.gc_region || 'mypurecloud.com');
    client.setPersistSettings(true, 'homesClient');
    updateStatus('Platform client initialized.');

    // === Client App SDK Setup ===
    const ClientApp = window.purecloud.apps.ClientApp;
    const myClientApp = new ClientApp({
      gcHostOrigin: config.gcHostOrigin,
      gcTargetEnv: config.gcTargetEnv
    });

    // Create Users API instance once
    const usersApi = new platformClient.UsersApi();

    // Helper to display user list nicely
    function displayUsers(users) {
      updateStatus(`✅ Retrieved ${users.length} user(s):`);
      users.forEach(user => {
        const name = user.name || 'N/A';
        const email = user.email || 'N/A';
        const title = user.title || '';
        updateStatus(`   • ${name} (${email}) ${title ? '- ' + title : ''}`);
      });
    }

    // === Bootstrap Listener - where we do API calls ===
    myClientApp.lifecycle.addBootstrapListener(() => {
      updateStatus(`Client App SDK bootstrapped (v${VERSION}).`);

      // 1. Get Current User (Me)
      usersApi.getUsersMe({ expand: ['presence', 'routingStatus'] })
        .then(me => {
          updateStatus(`✅ Current user: ${me.name} (${me.email || me.username})`, false);
          console.log('Current user full object:', me);
        })
        .catch(err => {
          updateStatus(`❌ Failed to get current user: ${err.message || err}`, true);
          console.error(err);
        });

      // 2. Get List of Users (with pagination example)
      const opts = {
        pageSize: 25,
        pageNumber: 1,
        // expand: ['presence', 'skills']   // uncomment if you need more details
      };

      usersApi.getUsers(opts)
        .then(response => {
          updateStatus(`✅ Fetched page ${response.pageNumber} of users (total: ${response.total || 'unknown'})`);
          if (response.entities && response.entities.length > 0) {
            displayUsers(response.entities);
          } else {
            updateStatus('No users returned on this page.');
          }
        })
        .catch(err => {
          updateStatus(`❌ Failed to get users: ${err.message || err}`, true);
          console.error('GetUsers error:', err);
        });

      // Tell Genesys Cloud we're ready
      myClientApp.lifecycle.bootstrapped();
      updateStatus('Lifecycle: bootstrapped() called successfully.');
    });

    // Stop listener
    myClientApp.lifecycle.addStopListener(() => {
      updateStatus('Client App SDK stopped.');
      myClientApp.lifecycle.stopped();
    });

    updateStatus('Event listeners registered. Waiting for Genesys Cloud bootstrap...');
  </script>
</body>
</html>
