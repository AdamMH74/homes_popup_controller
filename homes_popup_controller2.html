<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HOMES UI</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 10px; }
    h1 { font-size: 18px; color: #007bff; }
    .info { background-color: #f5f5f5; padding: 10px; border-radius: 5px; margin-bottom: 10px; }
    .label { font-weight: bold; }
  </style>
</head>
<body>
  <h1>HOMES Page</h1>
  <div class="info">
    <p><span class="label">Conversation ID:</span> <span id="conversationId">N/A</span></p>
    <p><span class="label">Agent Email:</span> <span id="agentEmail">N/A</span></p>
    <p><span class="label">Language:</span> <span id="language">N/A</span></p>
    <p><span class="label">Host Origin:</span> <span id="hostOrigin">N/A</span></p>
    <p><span class="label">Target Env:</span> <span id="targetEnv">N/A</span></p>
    <p><span class="label">Debug:</span> <span id="debug">N/A</span></p>
  </div>

  <script>
    // ==================== Read URL parameters ====================
    const params = new URLSearchParams(window.location.search);
    const conversationId = params.get('gc_conversationId') || 'N/A';
    const agentEmail = params.get('agentEmail') || 'N/A';
    const language = params.get('language') || 'en-US';
    const hostOrigin = params.get('gcHostOrigin') || window.location.origin;
    const targetEnv = params.get('gcTargetEnv') || 'mypurecloud.com';
    const debug = params.get('debug') || 'false';

    // ==================== Populate DOM ====================
    document.getElementById('conversationId').textContent = conversationId;
    document.getElementById('agentEmail').textContent = agentEmail;
    document.getElementById('language').textContent = language;
    document.getElementById('hostOrigin').textContent = hostOrigin;
    document.getElementById('targetEnv').textContent = targetEnv;
    document.getElementById('debug').textContent = debug;

    // ==================== Example: load dynamic content ====================
    // Here you can fetch additional UI data from your own backend
    // using fetch() to your server, NOT directly cross-origin Genesys Cloud endpoints.
    // Example:
    /*
    fetch(`/api/homes?conversationId=${conversationId}`)
      .then(res => res.json())
      .then(data => { console.log(data); })
      .catch(err => console.error(err));
    */
  </script>
</body>
</html>
