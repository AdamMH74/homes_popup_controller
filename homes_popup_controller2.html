<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HOMES Client & Popup Controller</title>

  <script src="https://sdk-cdn.mypurecloud.com/javascript/221.0.0/purecloud-platform-client-v2.min.js"></script>
  <script src="https://sdk-cdn.mypurecloud.com/client-apps/2.6.7/purecloud-client-app-sdk.js"></script>

  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: #f8f9fa;
      color: #333;
    }
    h1 { color: #0052cc; margin-bottom: 8px; }
    .subtitle { color: #666; margin-bottom: 20px; font-size: 15px; }

    #statusBox {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 20px;
      max-width: 920px;
      max-height: 75vh;
      overflow-y: auto;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      line-height: 1.55;
      font-size: 14px;
    }
    #statusBox p { margin: 8px 0; padding: 6px 10px; border-radius: 4px; }

    .error   { background: #ffebee; color: #c62828; border-left: 5px solid #c62828; }
    .success { background: #e8f5e9; color: #2e7d32; border-left: 5px solid #2e7d32; }
    .info    { background: #e3f2fd; color: #1565c0; border-left: 5px solid #1565c0; }
    .warning { background: #fff3e0; color: #ef6c00; border-left: 5px solid #ef6c00; }

    button {
      margin-top: 15px;
      padding: 10px 24px;
      background-color: #0052cc;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover { background-color: #003d99; }
    button:disabled { background-color: #888; cursor: not-allowed; }

    .version { font-size: 12px; color: #888; margin-top: 12px; }
  </style>
</head>

<body>
<h1>HOMES Client & Popup Controller</h1>
<p class="subtitle">Genesys Cloud Integration • Version <span id="appVersion">1.3.1</span></p>

<div id="statusBox">
  <p class="info">Initializing HOMES Client & Popup Controller...</p>
</div>

<button id="openHomesBtn" disabled>Open HOMES CRM</button>
<button onclick="logout()">Logout & Clear Token</button>

<div class="version">
  SDK: purecloud-platform-client-v2 • Implicit Grant (Consider migrating to PKCE)
</div>

<script>
const VERSION = '1.3.1';
const BLOCKED_AGENT_IDS = ['a45dcb75-1121-4fb0-b956-3fb9437e539e'];

let platformClient = window.platformClient || (window.require ? window.require('platformClient') : null);
let client = platformClient?.ApiClient?.instance;

let notificationsApi = null;
let usersApi = null;

let currentUser = null;
let notificationSocket = null;
let pendingPopUrl = null;

/* ================= STATUS ================= */
function updateStatus(message, type = 'info') {
  const box = document.getElementById('statusBox');
  if (!box) return;

  const p = document.createElement('p');
  p.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
  p.classList.add(type);
  box.appendChild(p);
  box.scrollTop = box.scrollHeight;

  console.log(`[HOMES v${VERSION}]`, message);
}

/* ================= REDIRECT GUARD ================= */
function guardRedirectLoop() {
  const count = parseInt(sessionStorage.getItem('authRedirects') || '0', 10);
  if (count > 3) {
    updateStatus('Auth loop detected.', 'error');
    return false;
  }
  sessionStorage.setItem('authRedirects', count + 1);
  return true;
}

/* ================= CONFIG ================= */
function getQueryParams() {
  const p = new URLSearchParams(window.location.search);
  return {
    gc_clientId: p.get('gc_clientId'),
    gc_region: p.get('gc_region'),
    gc_redirectUrl: p.get('gc_redirectUrl')
  };
}

function normalizeRegion(region) {
  if (!region) return null;
  let r = region.toLowerCase().replace(/^https?:\/\//, '').replace(/^login\./, '').replace(/^api\./, '');
  if (r.startsWith('purecloud.')) r = 'mypurecloud.' + r.split('purecloud.')[1];
  return r.includes('mypurecloud') ? r : null;
}

function getOAuthHost(region) {
  const n = normalizeRegion(region);
  return n ? `login.${n}` : 'login.mypurecloud.com';
}

function getApiHost(region) {
  const n = normalizeRegion(region);
  return n ? `api.${n}` : 'api.mypurecloud.com';
}

/* ================= TOKEN ================= */
function parseHashToken() {
  const hash = new URLSearchParams(window.location.hash.substring(1));
  let token = hash.get('access_token');

  const returnedState = hash.get('state');
  const expectedState = sessionStorage.getItem('oauth_state');

  if (returnedState && expectedState && returnedState !== expectedState) {
    console.error('State mismatch');
    return null;
  }

  if (token) {
    localStorage.setItem('homesToken', token);
  } else {
    token = localStorage.getItem('homesToken');
  }

  return token;
}

/* ================= AUTH ================= */
function redirectToLogin(config) {
  if (!guardRedirectLoop()) return;

  const state = Math.random().toString(36).substring(2);
  sessionStorage.setItem('oauth_state', state);

  const url =
    `https://${getOAuthHost(config.gc_region)}/oauth/authorize` +
    `?response_type=token` +
    `&client_id=${encodeURIComponent(config.gc_clientId)}` +
    `&redirect_uri=${encodeURIComponent(config.gc_redirectUrl)}` +
    `&state=${state}`;

  window.location.href = url;
}

/* ================= WEBSOCKET ================= */
async function setupNotifications(userId) {
  try {
    updateStatus('Creating notification channel...', 'info');

    const channel = await notificationsApi.postNotificationsChannels();

    await notificationsApi.putNotificationsChannelSubscriptions(channel.id, [
      { id: `v2.users.${userId}.conversations.calls` }
    ]);

    notificationSocket = new WebSocket(channel.connectUri);

    notificationSocket.onopen = () => {
      updateStatus('WebSocket connected.', 'success');
    };

    notificationSocket.onmessage = (msg) => {
      const data = JSON.parse(msg.data);

      if (data.topicName?.includes('conversations.calls')) {
        handleCallEvent(data.eventBody);
      }
    };

    notificationSocket.onclose = () => {
      updateStatus('WebSocket closed. Reconnecting...', 'warning');
      setTimeout(() => setupNotifications(userId), 5000);
    };

    notificationSocket.onerror = (err) => {
      console.error(err);
      updateStatus('WebSocket error.', 'error');
    };

  } catch (err) {
    console.error(err);
    updateStatus('Notification setup failed.', 'error');
  }
}

/* ================= CALL HANDLER ================= */
function handleCallEvent(eventBody) {
  try {
    const participants = eventBody.participants || [];

    const agent = participants.find(p =>
      p.purpose === 'agent' &&
      p.user?.id === currentUser.id
    );

    if (!agent) return;

    const popUrl = participants
      .map(p => p.attributes?.UD_ScreenPop_URL)
      .find(Boolean);

    if (!pendingPopUrl && agent.state === 'connected' && popUrl) {
      pendingPopUrl = popUrl;

      document.getElementById('openHomesBtn').disabled = false;

      updateStatus('Call detected — click button to open CRM.', 'info');
    }

  } catch (err) {
    console.error(err);
  }
}

/* ================= OPEN CRM ================= */
function openHOMESTab(popUrl) {
  if (!popUrl) {
    updateStatus('No screen pop URL.', 'warning');
    return;
  }

  const email = currentUser?.email || '';
  const token = localStorage.getItem('homesToken');

  const url = new URL(popUrl);
  url.searchParams.set('p2', email);
  if (token) url.searchParams.set('token', token);

  const a = document.createElement('a');
  a.href = url.toString();
  a.target = '_blank';
  a.rel = 'noopener noreferrer';

  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);

  updateStatus('CRM opened.', 'success');
}

/* ================= INIT ================= */
async function init() {
  try {
    updateStatus('Initializing...', 'info');

    let config = getQueryParams();
    if (!config.gc_clientId) {
      config = JSON.parse(localStorage.getItem('homesConfig') || '{}');
    }

    let token = parseHashToken();

    if (!token) {
      redirectToLogin(config);
      return;
    }

    client.setEnvironment(getApiHost(config.gc_region));
    client.setAccessToken(token);

    notificationsApi = new platformClient.NotificationsApi();
    usersApi = new platformClient.UsersApi();

    currentUser = await usersApi.getUsersMe();

    updateStatus(`Logged in as ${currentUser.name}`, 'success');

    await setupNotifications(currentUser.id);

    document.getElementById('openHomesBtn')
      .addEventListener('click', () => openHOMESTab(pendingPopUrl));

  } catch (err) {
    console.error(err);
    updateStatus('Init failed.', 'error');
  }
}

/* ================= LOGOUT ================= */
function logout() {
  if (!confirm('Logout?')) return;

  if (notificationSocket) notificationSocket.close();

  client?.logout?.();

  localStorage.clear();
  sessionStorage.clear();

  location.reload();
}

window.onload = init;
</script>
</body>
</html>
