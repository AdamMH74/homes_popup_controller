<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HOMES Client & Popup Controller</title>

  <script src="https://sdk-cdn.mypurecloud.com/javascript/221.0.0/purecloud-platform-client-v2.min.js"></script>
  <script src="https://sdk-cdn.mypurecloud.com/client-apps/2.6.7/purecloud-client-app-sdk.js"></script>

  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: #f8f9fa;
      color: #333;
    }
    h1 { color: #0052cc; margin-bottom: 8px; }
    .subtitle { color: #666; margin-bottom: 20px; font-size: 15px; }

    #statusBox {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 20px;
      max-width: 920px;
      max-height: 75vh;
      overflow-y: auto;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      line-height: 1.55;
      font-size: 14px;
    }
    #statusBox p { margin: 8px 0; padding: 6px 10px; border-radius: 4px; }

    .error   { background: #ffebee; color: #c62828; border-left: 5px solid #c62828; }
    .success { background: #e8f5e9; color: #2e7d32; border-left: 5px solid #2e7d32; }
    .info    { background: #e3f2fd; color: #1565c0; border-left: 5px solid #1565c0; }
    .warning { background: #fff3e0; color: #ef6c00; border-left: 5px solid #ef6c00; }

    button {
      margin-top: 15px;
      padding: 10px 24px;
      background-color: #0052cc;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover { background-color: #003d99; }
    button:disabled { background-color: #888; cursor: not-allowed; }

    .version { font-size: 12px; color: #888; margin-top: 12px; }
  </style>
</head>

<body>
<h1>HOMES Client & Popup Controller</h1>
<p class="subtitle">Genesys Cloud Integration • Version <span id="appVersion">1.3.1</span></p>

<div id="statusBox">
  <p class="info">Initializing HOMES Client & Popup Controller...</p>
</div>

<button id="openHomesBtn" disabled>Open HOMES CRM</button>
<button onclick="logout()">Logout & Clear Token</button>

<div class="version">
  SDK: purecloud-platform-client-v2 • Implicit Grant (Consider migrating to PKCE)
</div>

<script>
const VERSION = '1.3.1';
const BLOCKED_AGENT_IDS = ['a45dcb75-1121-4fb0-b956-3fb9437e539e'];

let crmTab = null;
let platformClient = window.platformClient || (window.require ? window.require('platformClient') : null);
let client = platformClient?.ApiClient.instance;

let notificationsApi = null;
let conversationsApi = null;
let usersApi = null;

let currentUser = null;
let notificationSocket = null;
let pendingPopUrl = null;

function updateStatus(message, type = 'info') {
  const statusBox = document.getElementById('statusBox');
  if (!statusBox) return;

  const p = document.createElement('p');
  p.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
  p.classList.add(type);
  statusBox.appendChild(p);
  statusBox.scrollTop = statusBox.scrollHeight;

  console.log(`[HOMES v${VERSION}] [${type.toUpperCase()}]`, message);
}

/* =====================================================================
   ✅ FIX — Redirect loop protection
===================================================================== */
function guardRedirectLoop() {
  const MAX_REDIRECTS = 3;
  const count = parseInt(sessionStorage.getItem('authRedirects') || '0', 10);

  if (count > MAX_REDIRECTS) {
    updateStatus('Authentication loop detected. Please reload manually.', 'error');
    return false;
  }

  sessionStorage.setItem('authRedirects', count + 1);
  return true;
}

/* =====================================================================
   FIX #1 — Force re-auth
===================================================================== */
function forceReauth() {
  updateStatus('Session expired or invalid — redirecting to login...', 'warning');

  localStorage.removeItem('homesToken');
  localStorage.removeItem('homesTokenExpires');
  localStorage.removeItem('homesTokenType');

  window.location.hash = '';

  let config = JSON.parse(localStorage.getItem('homesConfig') || '{}');

  if (!config.gc_clientId || !config.gc_region || !config.gc_redirectUrl) {
    const params = new URLSearchParams(window.location.search);
    config = {
      gc_clientId: params.get('gc_clientId'),
      gc_region: params.get('gc_region'),
      gc_redirectUrl: params.get('gc_redirectUrl')
    };
  }

  if (!config.gc_clientId || !config.gc_region || !config.gc_redirectUrl) {
    updateStatus('Cannot reauthenticate — missing config.', 'error');
    return;
  }

  localStorage.setItem('homesConfig', JSON.stringify(config));

  const oauthHost = getOAuthHost(config.gc_region);
  const redirectUri = encodeURIComponent(config.gc_redirectUrl);

  // ✅ FIX
  if (!guardRedirectLoop()) return;

  // ✅ FIX
  const state = Math.random().toString(36).substring(2);
  sessionStorage.setItem('oauth_state', state);

  window.location.href =
    `https://${oauthHost}/oauth/authorize` +
    `?response_type=token` +
    `&client_id=${encodeURIComponent(config.gc_clientId)}` +
    `&redirect_uri=${redirectUri}` +
    `&state=${state}`;
}

/* ===================================================================== */

async function safeGetCurrentUser() {
  try {
    return await usersApi.getUsersMe();
  } catch (err) {
    if (
      err?.status === 401 ||
      err?.message?.toLowerCase().includes('invalid login credentials')
    ) {
      forceReauth();
    }
    throw err;
  }
}

/* ===================================================================== */

function getQueryParams() {
  const params = new URLSearchParams(window.location.search);
  return {
    gc_clientId: params.get('gc_clientId'),
    gc_region: params.get('gc_region'),
    gc_redirectUrl: params.get('gc_redirectUrl')
  };
}

function normalizeRegion(region) {
  if (!region) return null;
  let r = region.toLowerCase().trim()
    .replace(/^https?:\/\//, '')
    .replace(/^login\./, '')
    .replace(/^api\./, '');
  if (r.startsWith('purecloud.')) {
    r = 'mypurecloud.' + r.split('purecloud.')[1];
  }
  return r.includes('mypurecloud') ? r : null;
}

function getOAuthHost(region) {
  const n = normalizeRegion(region);
  return n ? `login.${n}` : 'login.mypurecloud.com';
}

function getApiHost(region) {
  const n = normalizeRegion(region);
  return n ? `api.${n}` : 'api.mypurecloud.com';
}

function parseHashToken() {
  const hash = window.location.hash.substring(1);
  const params = new URLSearchParams(hash);

  let token = params.get('access_token');
  let expiresIn = params.get('expires_in');
  let tokenType = params.get('token_type');

  // ✅ FIX
  const returnedState = params.get('state');
  const expectedState = sessionStorage.getItem('oauth_state');
  if (returnedState && expectedState && returnedState !== expectedState) {
    console.error('OAuth state mismatch');
    return { token: null, expiresIn: 0 };
  }

  if (token) {
    token = decodeURIComponent(token);

    const CLOCK_SKEW_SECONDS = 120;
    const expiry =
      Date.now() +
      (parseInt(expiresIn || 3600, 10) - CLOCK_SKEW_SECONDS) * 1000;

    localStorage.setItem('homesToken', token);
    localStorage.setItem('homesTokenExpires', expiry);
    localStorage.setItem('homesTokenType', tokenType || 'bearer');
  } else {
    token = localStorage.getItem('homesToken');
    const storedExpiry = parseInt(localStorage.getItem('homesTokenExpires'), 10);

    const EXPIRY_BUFFER_MS = 5 * 60 * 1000;

    if (token && storedExpiry && (storedExpiry - EXPIRY_BUFFER_MS) > Date.now()) {
      expiresIn = Math.floor((storedExpiry - Date.now()) / 1000);
    } else {
      token = null;
    }
  }

  return { token, expiresIn: parseInt(expiresIn || 0, 10) };
}

/* ===================================================================== */

function openHOMESTab(popUrl, forceTestUrl = true) {
  // ✅ Force test URL if requested
  if (forceTestUrl || !popUrl) {
    updateStatus('Using forced test URL for HOMES CRM...', 'warning');
    popUrl = 'https://adammh74.github.io/homes_popup_controller/Home_crm.html';
  }

  // ✅ Build the URL only here
    const finalUrl = new URL(popUrl);
    finalUrl.searchParams.set('p2', userEmail || '');
    if (token) finalUrl.searchParams.set('token', token);

    // ✅ Open the final URL immediately on user click
    crmTab = window.open(finalUrl.toString(), '_blank');

    if (!crmTab) {
      updateStatus('Popup blocked! Please allow popups for this site.', 'error');
      return;
    }

    updateStatus('HOMES CRM tab opened by user.', 'success');

  } catch (err) {
    updateStatus(`Failed to open HOMES tab: ${err.message}`, 'error');
  }
}

/* ===================================================================== */

async function checkExistingActiveCalls(user) {
  if (!conversationsApi || !user) return;

  let attempts = 0;
  const maxAttempts = 12;

  while (attempts < maxAttempts) {
    try {
      const result = await conversationsApi.getConversationsCalls();
      const calls = result?.entities || [];

      for (const call of calls) {
        const participants = call.participants || [];
        const agent = participants.find(p => p.purpose === 'agent' && p.user?.id === user.id);
        const popUrl = participants.map(p => p.attributes?.UD_ScreenPop_URL).find(Boolean);

        if (agent?.state === 'connected' && popUrl) {
          pendingPopUrl = popUrl;
          document.getElementById('openHomesBtn').disabled = false;
          updateStatus('Existing call found. Click button to open HOMES CRM.', 'info');
          return;
        }
      }
    } catch {}

    await new Promise(r => setTimeout(r, 2500));
    attempts++;
  }

  updateStatus('No active calls with screen pop found.', 'info');
}

/* ===================================================================== */

async function init() {
  try {
    updateStatus('Starting initialization...', 'info');

    let config = getQueryParams();

// ✅ FIX — fallback to stored config if query params missing
if (!config.gc_clientId || !config.gc_region || !config.gc_redirectUrl) {
  config = JSON.parse(localStorage.getItem('homesConfig') || '{}');
}
    let { token } = parseHashToken();

    // ✅ FIX
    const expiry = parseInt(localStorage.getItem('homesTokenExpires'), 10);

    if (!token || !expiry || Date.now() > expiry) {
      if (config.gc_clientId && config.gc_region && config.gc_redirectUrl) {
  localStorage.setItem('homesConfig', JSON.stringify(config));
}

      // ✅ FIX
      if (!guardRedirectLoop()) return;

      const oauthHost = getOAuthHost(config.gc_region);
      const redirectUri = encodeURIComponent(config.gc_redirectUrl);

      // ✅ FIX
      const state = Math.random().toString(36).substring(2);
      sessionStorage.setItem('oauth_state', state);

      updateStatus('No valid token found — redirecting to Genesys Cloud login...', 'info');

      window.location.href =
        `https://${oauthHost}/oauth/authorize?response_type=token` +
        `&client_id=${encodeURIComponent(config.gc_clientId)}` +
        `&redirect_uri=${redirectUri}` +
        `&state=${state}`;
      return;
    }

    localStorage.setItem('homesConfig', JSON.stringify(config));

    client.setEnvironment(getApiHost(config.gc_region));
    client.setPersistSettings(true, 'homesClient');
    client.setAccessToken(token);

    notificationsApi = new platformClient.NotificationsApi();
    conversationsApi = new platformClient.ConversationsApi();
    usersApi = new platformClient.UsersApi();

    currentUser = await safeGetCurrentUser();

    updateStatus(
  `Logged in successfully as: ${currentUser.name} (${currentUser.email})`,
  'success'
);

await checkExistingActiveCalls(currentUser);

// ✅ ADD THIS LINE HERE
document.getElementById('openHomesBtn')
  .addEventListener('click', () => openHOMESTab(pendingPopUrl));



    updateStatus('HOMES Client initialized successfully.', 'success');

  } catch (err) {
    console.error(err);
    updateStatus(`Initialization failed: ${err.message}`, 'error');
  }
}

function logout() {
  if (!confirm('Clear all tokens and logout?')) return;

  if (client) client.logout?.();
  localStorage.clear();
  sessionStorage.clear(); // ✅ FIX
  window.location.reload();
}

window.onload = init;
</script>
</body>
</html>
